<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Register</title>
    <style>
        /* --- GLOBAL RESET & THEME --- */
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #050505;
            color: #fff;
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- BACKGROUND GLOWS --- */
        .glow-top {
            position: absolute;
            top: -15vh;
            left: -20vw;
            width: 120vw;
            height: 120vw;
            background: radial-gradient(circle, rgba(123, 0, 148, 0.4) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .glow-bottom {
            position: absolute;
            bottom: -100px;
            right: -50px;
            width: 200px;
            height: 200px;
            background-color: #ff00d4;
            opacity: 0.08;
            border-radius: 50%;
            filter: blur(40px);
            pointer-events: none;
            z-index: 0;
        }

        /* --- LAYOUT --- */
        .container {
            position: relative;
            z-index: 10;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 24px;
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }

        /* --- TYPOGRAPHY --- */
        .header {
            margin-bottom: 30px;
            margin-top: 20px;
        }

        .title-outline {
            font-size: 32px;
            font-weight: 300;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
            margin: 0;
            line-height: 1;
        }

        .title-filled {
            font-size: 32px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 2px;
            margin: 0;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
            font-weight: 400;
        }

        /* --- FORMS --- */
        .input-group {
            margin-bottom: 15px;
            position: relative;
            z-index: 20;
        }

        .label {
            font-size: 10px;
            font-weight: 700;
            color: #ff00d4;
            margin-bottom: 6px;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: block;
        }

        .input-field {
            position: relative;
            z-index: 30;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 12px 14px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
            pointer-events: auto;
        }

        .input-field:focus {
            border-color: #ff00d4;
            background-color: rgba(255, 255, 255, 0.08);
        }

        .spacer {
            height: 10px;
        }

        /* --- BUTTONS --- */
        .pop-btn {
            position: relative;
            z-index: 20;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            user-select: none;
            border: none;
            background: none;
            padding: 0;
            width: 100%;
        }

        .pop-btn:active {
            transform: scale(0.95);
            transition: transform 0.1s ease-out;
        }

        .gradient-btn {
            width: 100%;
            padding: 14px;
            border-radius: 22px;
            background: linear-gradient(90deg, #7b0094, #ff00d4);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(255, 0, 212, 0.4);
            margin-top: 10px;
        }

        .btn-text {
            color: #fff;
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- LINKS --- */
        .login-link {
            text-align: center;
            margin-top: 20px;
            display: block;
            text-decoration: none;
        }

        .login-text {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        .login-highlight {
            color: #fff;
            font-weight: 700;
        }

        /* --- LOADING OVERLAY --- */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 999;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 0, 212, 0.3);
            border-radius: 50%;
            border-top-color: #ff00d4;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="glow-top"></div>
    <div class="glow-bottom"></div>

    <div id="loading-overlay">
        <div class="spinner"></div>
    </div>

    <div class="container">
        
        <div class="header">
            <h1 class="title-outline">Start</h1>
            <h1 class="title-filled">Trading</h1>
            <p class="subtitle">Create your secure account.</p>
        </div>

        <div class="input-group">
            <label class="label">USERNAME</label>
            <input type="text" id="username" class="input-field" placeholder="e.g. CryptoKing" autocapitalize="none">
        </div>

        <div class="input-group">
            <label class="label">EMAIL</label>
            <input type="email" id="email" class="input-field" placeholder="name@domain.com" autocapitalize="none">
        </div>

        <div class="input-group">
            <label class="label">MOBILE</label>
            <input type="tel" id="mobile" class="input-field" placeholder="+1 234 567 890">
        </div>

        <div class="input-group">
            <label class="label">PASSWORD</label>
            <input type="password" id="password" class="input-field" placeholder="••••••••••••">
        </div>

        <div class="input-group">
            <label class="label">REFERRER CODE</label>
            <input type="tel" id="referrerAcc" class="input-field" placeholder="123456">
        </div>

        <div class="spacer"></div>

        <button id="registerBtn" class="pop-btn">
            <div class="gradient-btn">
                <span class="btn-text">CREATE ACCOUNT</span>
            </div>
        </button>

        <a href="index.html" class="pop-btn login-link">
            <span class="login-text">Already have an account? <span class="login-highlight">Sign In</span></span>
        </a>

    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';
        import { UserContext } from './userContext.js';

        const registerBtn = document.getElementById('registerBtn');
        const loadingOverlay = document.getElementById('loading-overlay');

        const inputs = {
            username: document.getElementById('username'),
            email: document.getElementById('email'),
            mobile: document.getElementById('mobile'),
            password: document.getElementById('password'),
            referrer: document.getElementById('referrerAcc')
        };

        registerBtn.addEventListener('click', async (e) => {
            e.preventDefault();

            // 1. Gather Values
            const val = {
                username: inputs.username.value.trim(),
                email: inputs.email.value.trim(),
                mobile: inputs.mobile.value.trim(),
                password: inputs.password.value.trim(),
                referrer: inputs.referrer.value.trim()
            };

            // 2. Client Side Validation
            if (!val.username || !val.email || !val.mobile || !val.password || !val.referrer) {
                alert('All fields are required.');
                return;
            }

            // Start Loading
            loadingOverlay.style.display = 'flex';
            const startTime = Date.now();

            try {
                // 3. Check Referrer
                const { data: refUser } = await supabase
                    .from('users')
                    .select('account_number')
                    .eq('account_number', val.referrer)
                    .maybeSingle();

                if (!refUser) {
                    throw new Error('Invalid Referrer: Account number does not exist.');
                }

                // 4. Insert User
                const { data: insertedUser, error } = await supabase
                    .from('users')
                    .insert([{
                        username: val.username,
                        email: val.email,
                        password: val.password,
                        mobile: val.mobile,
                        balance: 0,
                        referrer_account_number: refUser.account_number
                    }])
                    .select('*')
                    .single();

                if (error) {
                    if (error.code === '23505') throw new Error('Email or Mobile already registered.');
                    throw error;
                }

                // 5. Success - Min Duration Wait
                const elapsed = Date.now() - startTime;
                const remaining = Math.max(0, 3000 - elapsed);
                await new Promise(r => setTimeout(r, remaining));

                // Save & Redirect
                UserContext.setUser(insertedUser);
                window.location.href = 'main.html';

            } catch (err) {
                // Error - Min Duration Wait
                const elapsed = Date.now() - startTime;
                const remaining = Math.max(0, 3000 - elapsed);
                await new Promise(r => setTimeout(r, remaining));
                
                alert(err.message);
            } finally {
                loadingOverlay.style.display = 'none';
            }
        });
    </script>
</body>
</html>
