<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Title - CryptoPro</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* --- COPY ALL NECESSARY CSS FROM main.html --- */

      /* BODY AND GRID LAYOUT */
      body {
        background: linear-gradient(
          135deg,
          #050008 0%,
          #0a0010 25%,
          #030006 50%,
          #08000a 75%,
          #050008 100%
        );
        color: var(--text-main);
        font-family: "Inter", sans-serif;
        margin: 0;
        padding: 0;
        height: 100vh;
        overflow: hidden;
        display: grid;
        grid-template-rows: 48px 1fr;
      }

      :root {
        --bg-dark: #000000;
        --text-main: #ffffff;
        --text-muted: #8892b0;
        --text-light: #a8b5c9;
        --accent-pink: #ff00d4;
        --accent-purple: #7b0094;
        --accent-cyan: #00f0ff;
        --success: #00ff9d;
        --danger: #00f7ff;
        --warning: #ffb800;
        --glass-border: 1px solid rgba(255, 255, 255, 0.07);
      }

      /* TICKER */
      .market-ticker {
        background: #000000;
        border-bottom: 1px solid rgba(139, 92, 246, 0.15);
        overflow: hidden;
        display: flex;
        align-items: center;
        white-space: nowrap;
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        font-weight: 500;
        backdrop-filter: blur(10px);
      }

      .ticker-track {
        display: flex;
        animation: ticker 40s linear infinite;
        gap: 60px;
      }

      .ticker-item {
        display: flex;
        gap: 12px;
        padding: 8px 0;
        color: rgba(168, 181, 201, 0.9);
        align-items: center;
      }

      .t-up {
        color: #2dd4bf;
        font-weight: 700;
      }
      .t-down {
        color: #f43f5e;
        font-weight: 700;
      }

      @keyframes ticker {
        0% {
          transform: translateX(100%);
        }
        100% {
          transform: translateX(-100%);
        }
      }

      /* LAYOUT GRID */
      .layout-container {
        display: grid;
        grid-template-columns: 270px 1fr 360px;
        height: 100%;
        overflow: hidden;
        gap: 0;
      }

      /* SIDEBAR */
      .sidebar {
        background: linear-gradient(
          180deg,
          rgba(5, 0, 12, 0.95),
          rgba(10, 0, 20, 0.9)
        );
        border-right: 1.5px solid rgba(139, 92, 246, 0.15);
        padding: 24px 16px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        overflow-y: auto;
        overflow-x: hidden;
        backdrop-filter: blur(30px);
      }

      .sidebar::-webkit-scrollbar {
        width: 5px;
      }
      .sidebar::-webkit-scrollbar-track {
        background: transparent;
      }
      .sidebar::-webkit-scrollbar-thumb {
        background: linear-gradient(
          180deg,
          rgba(139, 92, 246, 0.4),
          rgba(236, 72, 153, 0.4)
        );
        border-radius: 10px;
      }

      .brand {
        font-size: 18px;
        font-weight: 800;
        margin-bottom: 32px;
        background: linear-gradient(90deg, #8b5cf6, #ec4899, #06b6d4);
        background-size: 300% 100%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: colorWave 4s ease infinite;
      }

      .nav-section {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .nav-section:not(:first-of-type) {
        margin-top: 16px;
        padding-top: 12px;
        border-top: 1px solid rgba(139, 92, 246, 0.15);
      }

      .nav-section-label {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        color: rgba(168, 181, 201, 0.6);
        letter-spacing: 0.9px;
        padding: 0 12px 6px;
      }

      .nav-item {
        padding: 11px 14px;
        border-radius: 10px;
        color: rgba(168, 181, 201, 0.8);
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 13px;
        font-weight: 600;
        position: relative;
        overflow: hidden;
      }

      .nav-item::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        width: 3px;
        background: linear-gradient(180deg, #8b5cf6, #ec4899);
        transform: scaleY(0);
        transition: transform 0.3s ease;
      }

      .nav-item:hover {
        background: linear-gradient(
          135deg,
          rgba(139, 92, 246, 0.2),
          rgba(236, 72, 153, 0.1)
        );
        color: #a78bfa;
        box-shadow: 0 0 20px rgba(139, 92, 246, 0.15);
      }

      .nav-item:hover::before {
        transform: scaleY(1);
      }

      .nav-item.active {
        background: linear-gradient(
          135deg,
          rgba(139, 92, 246, 0.25),
          rgba(236, 72, 153, 0.15)
        );
        color: #ec4899;
        box-shadow: 0 0 30px rgba(139, 92, 246, 0.2);
      }

      .nav-item.active::before {
        transform: scaleY(1);
      }

      .nav-icon {
        width: 18px;
        height: 18px;
        font-size: 16px;
      }

      /* MAIN CONTENT */
      .container {
        overflow-y: auto;
        padding: 32px;
      }

      .container::-webkit-scrollbar {
        width: 6px;
      }
      .container::-webkit-scrollbar-track {
        background: transparent;
      }
      .container::-webkit-scrollbar-thumb {
        background: rgba(139, 92, 246, 0.2);
        border-radius: 3px;
      }

      /* RIGHT PANEL */
      .right-panel {
        background: linear-gradient(
          135deg,
          rgba(8, 4, 18, 0.92),
          rgba(5, 30, 50, 0.88)
        );
        border-left: 1.5px solid rgba(139, 92, 246, 0.15);
        padding: 24px 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        overflow-y: auto;
        overflow-x: hidden;
        backdrop-filter: blur(30px);
      }

      .right-panel::-webkit-scrollbar {
        width: 5px;
      }
      .right-panel::-webkit-scrollbar-track {
        background: transparent;
      }
      .right-panel::-webkit-scrollbar-thumb {
        background: linear-gradient(
          180deg,
          rgba(139, 92, 246, 0.4),
          rgba(236, 72, 153, 0.4)
        );
        border-radius: 10px;
      }

      .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 12px;
        border-bottom: 1px solid rgba(139, 92, 246, 0.15);
      }

      .panel-title {
        font-size: 15px;
        font-weight: 700;
        background: linear-gradient(90deg, #8b5cf6, #ec4899);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .view-all-link {
        font-size: 11px;
        color: rgba(139, 92, 246, 0.7);
        cursor: pointer;
      }

      .traders-list-container {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .trader-row {
        display: flex;
        align-items: center;
        background: linear-gradient(
          135deg,
          rgba(10, 5, 25, 0.85),
          rgba(15, 8, 30, 0.75)
        );
        border: 1.5px solid rgba(139, 92, 246, 0.2);
        border-radius: 10px;
        padding: 12px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .trader-row:hover {
        border-color: rgba(236, 72, 153, 0.4);
        box-shadow: 0 8px 24px rgba(139, 92, 246, 0.2);
        transform: translateY(-3px);
      }

      .trader-avatar {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        margin-right: 12px;
        object-fit: cover;
        border: 1.5px solid rgba(139, 92, 246, 0.25);
        flex-shrink: 0;
      }

      .trader-details {
        flex: 1;
      }
      .t-name {
        font-size: 12px;
        font-weight: 600;
        color: #e0e7ff;
      }
      .t-role {
        font-size: 10px;
        color: rgba(168, 181, 201, 0.6);
        margin-top: 2px;
      }
      .t-profit {
        font-family: "JetBrains Mono";
        font-size: 12px;
        font-weight: 700;
      }

      @keyframes colorWave {
        0% {
          background-position: 0%;
        }
        50% {
          background-position: 100%;
        }
        100% {
          background-position: 0%;
        }
      }
    </style>
  </head>
  <body>
    <!-- TOP TICKER -->
    <div class="market-ticker">
      <div class="ticker-track">
        <div class="ticker-item">
          <span>BTC/USD</span> <span class="t-up">▲ $98,420</span>
        </div>
        <div class="ticker-item">
          <span>ETH/USD</span> <span class="t-down">▼ $2,840</span>
        </div>
        <div class="ticker-item">
          <span>SOL/USD</span> <span class="t-up">▲ $142.50</span>
        </div>
        <div class="ticker-item">
          <span>BNB/USD</span> <span class="t-up">▲ $612.00</span>
        </div>
        <div class="ticker-item">
          <span>XRP/USD</span> <span class="t-down">▼ $0.55</span>
        </div>
      </div>
    </div>

    <!-- MAIN LAYOUT -->
    <div class="layout-container">
      <!-- LEFT SIDEBAR -->
      <nav class="sidebar">
        <div class="brand">⚡ CRYPTO<span style="color: #fff">PRO</span></div>

        <div class="nav-section">
          <div class="nav-item" onclick="window.location.href = 'main.html'">
            <span class="nav-icon">📊</span>
            <span>Dashboard</span>
          </div>
          <div class="nav-item" onclick="window.location.href = 'deposit.html'">
            <span class="nav-icon">💰</span>
            <span>Wallet</span>
          </div>
          <div
            class="nav-item"
            onclick="window.location.href = 'transactions.html'"
          >
            <span class="nav-icon">📜</span>
            <span>History</span>
          </div>
        </div>

        <div class="nav-section">
          <div class="nav-section-label">Markets</div>
          <div
            class="nav-item"
            onclick="window.location.href = 'sendMoney.html'"
          >
            <span class="nav-icon">📈</span>
            <span>Trade Live</span>
          </div>
          <div
            class="nav-item"
            onclick="window.location.href = 'running-trades.html'"
          >
            <span class="nav-icon">⚡</span>
            <span>Active Trades</span>
          </div>
          <div class="nav-item" onclick="window.location.href = 'store.html'">
            <span class="nav-icon">🎁</span>
            <span>Rewards</span>
          </div>
        </div>

        <div class="nav-section">
          <div class="nav-section-label">Support</div>
          <div class="nav-item" onclick="window.location.href = 'help.html'">
            <span class="nav-icon">🎧</span>
            <span>Help & Support</span>
          </div>
        </div>
      </nav>

      <!-- CENTER CONTENT -->
      <main class="container">
        <!-- PAGE SPECIFIC CONTENT GOES HERE -->
      </main>

      <!-- RIGHT PANEL - TOP TRADERS -->
      <aside class="right-panel">
        <div class="panel-header">
          <span class="panel-title">👥 Top Traders</span>
          <span class="view-all-link">View All</span>
        </div>
        <div id="tradersList" class="traders-list-container">
          <div
            style="
              text-align: center;
              padding: 40px 20px;
              color: var(--text-muted);
            "
          >
            <div style="font-size: 12px">Connecting...</div>
          </div>
        </div>
      </aside>
    </div>

    <script type="module">
      import { supabase } from "./supabaseClient.js";

      async function loadTraders() {
        try {
          const { data } = await supabase
            .from("fake_traders")
            .select("id, name, image_url, designation")
            .limit(8);

          if (data) {
            const traders = data.map((t) => ({
              ...t,
              amount: Math.floor(Math.random() * 5000) + 500,
              trend: "up",
            }));

            renderTraders(traders);
            setInterval(() => simulateTraders(traders), 800);
          }
        } catch (err) {
          console.error("Error loading traders:", err);
        }
      }

      function renderTraders(traders) {
        const container = document.getElementById("tradersList");
        if (!container) return;

        container.innerHTML = traders
          .map(
            (t) => `
        <div class="trader-row" onclick="window.location.href='sendMoney.html'">
          <img src="${t.image_url}" class="trader-avatar" onerror="this.src='https://ai-public.creatie.ai/gen_page/f94b41a0-8e68-41ab-a41a-fabb8fb0db88/avatar.webp'">
          <div class="trader-details">
            <span class="t-name">${t.name}</span>
            <span class="t-role">${t.designation}</span>
          </div>
          <div class="t-profit t-up">+${t.amount.toFixed(2)}%</div>
        </div>
      `,
          )
          .join("");
      }

      function simulateTraders(traders) {
        traders.forEach((t, i) => {
          const profitEl = document.querySelector(
            `.trader-row:nth-child(${i + 1}) .t-profit`,
          );
          if (profitEl) {
            const change = Math.random() * 40 - 20;
            profitEl.className = `t-profit ${change >= 0 ? "t-up" : "t-down"}`;
            profitEl.innerText = `${change >= 0 ? "+" : ""}${(t.amount + change).toFixed(2)}%`;
          }
        });
      }

      loadTraders();
    </script>
  </body>
</html>
