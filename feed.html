<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Trending News | Quantum Core</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* --- FOUNDRY CORE DESIGN SYSTEM --- */
      :root {
        --bg-top: #000000;
        --bg-mid: #0a0500;
        --bg-bottom: #140a00;
        
        --gold-metallic: #d4af37;
        --gold-bright: #ffd700;
        --gold-dark: #b8860b;
        
        --glass-border: rgba(255, 215, 0, 0.15);
        --text-grey: #8b8b8b;
        
        --radius-app: 25px;
      }

      /* --- GLOBAL RESET --- */
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        outline: none;
      }

      body {
        background: linear-gradient(
          180deg,
          var(--bg-top) 0%,
          var(--bg-mid) 50%,
          var(--bg-bottom) 100%
        );
        background-attachment: fixed;
        color: #fff;
        font-family: "Inter", sans-serif;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container {
        width: 100%;
        max-width: 600px;
        padding: 20px;
        padding-bottom: 80px;
      }

      /* --- NAVIGATION --- */
      .nav-bar {
        margin-bottom: 30px;
        margin-top: 10px;
      }
      .back-btn {
        background: rgba(255, 215, 0, 0.05);
        border: 1px solid rgba(255, 215, 0, 0.2);
        color: var(--gold-bright);
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        padding: 10px 20px;
        border-radius: 30px;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s ease;
      }
      .back-btn:hover {
        background: rgba(255, 215, 0, 0.15);
        border-color: var(--gold-bright);
        box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        transform: translateX(-3px);
      }

      /* --- HEADER --- */
      .header {
        margin-bottom: 40px;
        text-align: left;
        padding-left: 5px;
        position: relative;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
      }
      
      .title-group {
        flex: 1;
      }

      .main-title {
        font-size: 36px;
        font-weight: 800;
        margin: 0;
        color: var(--gold-metallic);
        letter-spacing: 2px;
        text-transform: uppercase;
        text-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
      }
      .header-line {
        height: 3px;
        width: 60px;
        border-radius: 2px;
        background: linear-gradient(90deg, var(--gold-bright), transparent);
        margin-top: 10px;
        box-shadow: 0 0 10px var(--gold-dark);
      }

      .webinar-btn {
        background: linear-gradient(
          90deg,
          var(--gold-metallic),
          var(--gold-bright)
        );
        border: none;
        border-radius: 20px;
        padding: 10px 20px;
        color: #000;
        font-size: 11px;
        font-weight: 900;
        cursor: pointer;
        box-shadow: 0 5px 15px rgba(184, 134, 11, 0.3);
        text-transform: uppercase;
        text-decoration: none;
        letter-spacing: 1px;
        transition: all 0.3s ease;
      }
      .webinar-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
      }

      /* --- CARD --- */
      .card-container {
        margin-bottom: 30px;
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .card-container:hover {
        transform: translateY(-5px) scale(1.02);
      }

      .card {
        background: #080808;
        border-radius: var(--radius-app);
        overflow: hidden;
        position: relative;
        border: 1px solid var(--glass-border);
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
        transition: all 0.3s ease;
      }
      .card-container:hover .card {
        border-color: var(--gold-bright);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 15px rgba(212, 175, 55, 0.1);
      }

      /* Media */
      .media-container {
        width: 100%;
        height: 260px;
        position: relative;
        overflow: hidden;
      }
      .media-el {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.5s ease;
      }
      .card-container:hover .media-el {
        transform: scale(1.05);
      }

      .gradient-overlay {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 80%;
        background: linear-gradient(to bottom, transparent, #080808);
        pointer-events: none;
      }

      .date-badge {
        position: absolute;
        top: 15px;
        right: 15px;
        background: rgba(0, 0, 0, 0.6);
        padding: 6px 12px;
        border-radius: 12px;
        border: 1px solid rgba(255, 215, 0, 0.3);
        font-family: "JetBrains Mono";
        font-size: 10px;
        font-weight: 700;
        color: var(--gold-bright);
        backdrop-filter: blur(5px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.5);
      }

      .title-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 25px;
        z-index: 10;
      }

      .card-title {
        font-size: 22px;
        font-weight: 800;
        line-height: 1.2;
        margin: 0;
        color: #fff;
        text-shadow: 0 5px 15px rgba(0, 0, 0, 0.8);
        letter-spacing: -0.5px;
      }

      /* Content */
      .content-container {
        padding: 0 25px 25px 25px;
        position: relative;
        z-index: 10;
        margin-top: -10px; /* Pull text up into gradient */
      }
      
      .accent-line {
        width: 40px;
        height: 2px;
        border-radius: 2px;
        background: var(--gold-dark);
        margin-bottom: 15px;
        box-shadow: 0 0 10px var(--gold-dark);
      }

      .card-body {
        font-size: 14px;
        color: var(--text-grey);
        line-height: 1.6;
        margin: 0;
        font-weight: 500;
      }
      .card-container:hover .card-body {
        color: #ccc;
      }

      /* States */
      .loader {
        color: var(--gold-metallic);
        text-align: center;
        margin-top: 60px;
        font-weight: 700;
        letter-spacing: 2px;
        font-family: "JetBrains Mono";
        animation: pulse 1.5s infinite;
      }
      
      .empty-state {
        text-align: center;
        color: var(--text-grey);
        margin-top: 60px;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 1px;
      }

      @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="nav-bar">
        <a href="main.html" class="back-btn">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="3"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M15 18l-6-6 6-6" />
          </svg>
          DASHBOARD
        </a>
      </div>

      <div class="header">
        <div class="title-group">
            <h1 class="main-title">INTEL FEED</h1>
            <div class="header-line"></div>
        </div>
        <a href="webinar.html" class="webinar-btn">LIVE WEBINAR</a>
      </div>

      <div id="feedList">
        <div class="loader">[ ESTABLISHING UPLINK... ]</div>
      </div>
    </div>

    <script type="module">
      import { supabase } from "./supabaseClient.js";

      const listEl = document.getElementById("feedList");

      async function init() {
        try {
          const { data, error } = await supabase
            .from("feeds")
            .select("*")
            .order("created_at", { ascending: false });

          if (error) throw error;

          if (data && data.length > 0) {
            renderFeeds(data);
          } else {
            listEl.innerHTML =
              '<div class="empty-state">NO INTEL AVAILABLE</div>';
          }
        } catch (err) {
          listEl.innerHTML =
            '<div class="empty-state">[ FEED SYNCHRONIZATION ERROR ]</div>';
        }
      }

      function renderFeeds(feeds) {
        listEl.innerHTML = feeds
          .map((item) => {
            const date = new Date(item.created_at).toLocaleDateString(
              undefined,
              {
                month: "short",
                day: "numeric",
              }
            );

            const isVideo =
              item.banner_url &&
              (item.banner_url.endsWith(".mp4") ||
                item.banner_url.includes("video"));
            let mediaHtml = isVideo
              ? `<video class="media-el" autoplay loop muted playsinline><source src="${item.banner_url}" type="video/mp4"></video>`
              : `<img src="${item.banner_url}" class="media-el" alt="Banner">`;

            return `
                    <div class="card-container">
                        <div class="card">
                            <div class="media-container">
                                ${mediaHtml}
                                <div class="gradient-overlay"></div>
                                <div class="date-badge">${date}</div>
                                <div class="title-overlay">
                                    <h2 class="card-title">${item.title}</h2>
                                </div>
                            </div>
                            <div class="content-container">
                                <div class="accent-line"></div>
                                <p class="card-body">${item.body}</p>
                            </div>
                        </div>
                    </div>
                `;
          })
          .join("");
      }

      init();
    </script>
  </body>
</html>
