<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Rewards Store | Quantum Core</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* --- FOUNDRY CORE DESIGN SYSTEM --- */
      :root {
        --bg-top: #000000;
        --bg-mid: #0a0500;
        --bg-bottom: #140a00;
        
        --gold-metallic: #d4af37;
        --gold-bright: #ffd700;
        --gold-dark: #b8860b;
        
        --status-green: #00ff88;
        --status-red: #ff4500;
        --status-blue: #00f2ff;
        
        --card-bg: #080808;
        --glass-border: rgba(255, 215, 0, 0.15);
        --text-grey: #8b8b8b;
        
        --radius-app: 25px;
      }

      /* --- GLOBAL RESET --- */
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        outline: none;
      }

      body {
        background: linear-gradient(
          180deg,
          var(--bg-top) 0%,
          var(--bg-mid) 50%,
          var(--bg-bottom) 100%
        );
        background-attachment: fixed;
        color: #fff;
        font-family: "Inter", sans-serif;
        margin: 0;
        padding: 0;
        min-height: 100vh;
      }

      .page-wrapper {
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
        padding-bottom: 80px;
      }

      /* --- NAV --- */
      .nav-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 30px;
      }
      .back-btn {
        background: rgba(255, 215, 0, 0.05);
        border: 1px solid rgba(255, 215, 0, 0.2);
        color: var(--gold-bright);
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        padding: 10px 20px;
        border-radius: 30px;
        text-decoration: none;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 8px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .back-btn:hover {
        background: rgba(255, 215, 0, 0.15);
        border-color: var(--gold-bright);
        box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        transform: translateX(-3px);
      }

      .balance-chip {
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid var(--gold-dark);
        padding: 8px 16px;
        border-radius: 30px;
        display: flex;
        align-items: center;
        gap: 10px;
        box-shadow: 0 0 15px rgba(184, 134, 11, 0.2);
        backdrop-filter: blur(10px);
      }
      .bal-label {
        font-size: 9px;
        color: var(--text-grey);
        text-transform: uppercase;
        font-weight: 800;
        letter-spacing: 1px;
      }
      .bal-val {
        font-family: "JetBrains Mono";
        font-weight: 800;
        color: var(--gold-bright);
        font-size: 14px;
        text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
      }

      /* --- HEADER --- */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin-bottom: 40px;
        padding: 0 10px;
        border-bottom: 1px solid rgba(255, 215, 0, 0.1);
        padding-bottom: 20px;
      }
      .title-group h1 {
        font-size: 32px;
        font-weight: 800;
        margin: 0;
        color: var(--gold-metallic);
        letter-spacing: 2px;
        text-transform: uppercase;
        text-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
      }
      .title-group p {
        color: var(--text-grey);
        font-size: 10px;
        margin-top: 5px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
        opacity: 0.7;
      }

      .history-link {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #fff;
        text-decoration: none;
        font-size: 11px;
        font-weight: 800;
        padding: 12px 20px;
        border-radius: 20px;
        background: linear-gradient(90deg, #1a1005, #0a0500);
        border: 1px solid rgba(255, 215, 0, 0.2);
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .history-link:hover {
        border-color: var(--gold-bright);
        box-shadow: 0 0 15px rgba(255, 215, 0, 0.15);
        transform: translateY(-2px);
      }

      /* --- PRODUCT GRID --- */
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 20px;
      }

      @media (min-width: 600px) {
        .grid {
          grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
          gap: 30px;
        }
      }

      /* --- CARD --- */
      .card {
        background: linear-gradient(145deg, #0e0e0e, #050505);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-app);
        padding: 16px;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
      }
      
      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: var(--radius-app);
        padding: 1px;
        background: linear-gradient(135deg, rgba(255,215,0,0.3), transparent);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        opacity: 0.5;
        transition: 0.4s;
      }

      .card:hover {
        transform: translateY(-8px) scale(1.02);
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(255, 215, 0, 0.1);
        border-color: var(--gold-bright);
      }
      
      .card:hover::before { opacity: 1; }

      .card:active {
        transform: scale(0.98);
      }

      .img-box {
        width: 100%;
        aspect-ratio: 1/1;
        background: #000;
        border-radius: 18px;
        margin-bottom: 15px;
        overflow: hidden;
        position: relative;
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: 0.4s;
      }
      .card:hover .img-box { border-color: rgba(255, 215, 0, 0.3); }
      
      .prod-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: 0.5s ease;
      }
      .card:hover .prod-img { transform: scale(1.1); }

      .info-box {
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      .prod-title {
        font-size: 15px;
        font-weight: 700;
        color: #fff;
        margin-bottom: 8px;
        line-height: 1.3;
      }
      .prod-price {
        font-family: "JetBrains Mono";
        font-size: 18px;
        font-weight: 800;
        color: var(--gold-bright);
        margin-bottom: 15px;
        text-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
      }

      .claim-btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 15px;
        background: linear-gradient(
          90deg,
          var(--gold-metallic),
          var(--gold-dark)
        );
        color: #000;
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 2px;
        cursor: pointer;
        margin-top: auto;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }
      
      .claim-btn:hover {
        background: var(--gold-bright);
        box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        transform: translateY(-2px);
      }

      /* --- MODAL --- */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.95);
        backdrop-filter: blur(15px);
        z-index: 1000;
        display: none;
        align-items: center;
        justify-content: center;
        animation: fadeIn 0.3s ease-out;
      }

      .modal-card {
        width: 90%;
        max-width: 400px;
        background: linear-gradient(160deg, #100a05, #000);
        border: 1px solid var(--gold-dark);
        border-radius: 30px;
        padding: 35px;
        position: relative;
        box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), 0 0 20px rgba(184, 134, 11, 0.2);
        animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .close-icon {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 50%;
        width: 35px;
        height: 35px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: var(--gold-bright);
        font-size: 16px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: 0.3s;
      }
      .close-icon:hover {
        background: var(--gold-bright);
        color: #000;
        transform: rotate(90deg);
      }

      .modal-header {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 30px;
      }
      .modal-img {
        width: 90px;
        height: 90px;
        border-radius: 18px;
        object-fit: cover;
        border: 1px solid var(--gold-dark);
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
      }
      .modal-info h3 {
        margin: 0;
        font-size: 20px;
        color: #fff;
        font-weight: 800;
        line-height: 1.2;
        margin-bottom: 5px;
      }
      .modal-info span {
        font-family: "JetBrains Mono";
        color: var(--gold-bright);
        font-weight: 800;
        font-size: 18px;
        text-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
      }

      .input-group {
        margin-bottom: 20px;
      }
      .input-label {
        font-size: 10px;
        color: var(--text-grey);
        margin-bottom: 8px;
        display: block;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1.5px;
      }
      .modal-input {
        width: 100%;
        background: #050505;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 16px 20px;
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        transition: 0.3s;
        box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
      }
      .modal-input:focus {
        border-color: var(--gold-bright);
        box-shadow: 0 0 15px rgba(255, 215, 0, 0.1);
        background: #000;
      }

      .modal-btn {
        width: 100%;
        height: 60px;
        border: none;
        border-radius: 18px;
        background: linear-gradient(
          90deg,
          var(--gold-metallic),
          var(--gold-bright)
        );
        color: #000;
        font-weight: 900;
        font-size: 14px;
        cursor: pointer;
        margin-top: 15px;
        text-transform: uppercase;
        letter-spacing: 2px;
        transition: 0.3s;
        box-shadow: 0 10px 30px rgba(184, 134, 11, 0.3);
      }
      .modal-btn:hover {
        background: var(--gold-bright);
        box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        transform: translateY(-2px);
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(212, 175, 55, 0.2);
        border-top: 3px solid var(--gold-bright);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 80px auto;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideUp {
        from { transform: translateY(50px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div class="page-wrapper">
      <div class="nav-bar">
        <a href="main.html" class="back-btn pop-click">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="3"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M15 18l-6-6 6-6" />
          </svg>
          DASHBOARD
        </a>

        <div class="balance-chip">
          <span class="bal-label">TOTAL EARNED</span>
          <span id="userBal" class="bal-val">$0.00</span>
        </div>
      </div>

      <div class="header">
        <div class="title-group">
          <h1>REWARDS STORE</h1>
          <p>EXCHANGE CREDITS FOR GLOBAL SUPPLY</p>
        </div>
        <a href="orders.html" class="history-link pop-click">📦 MY ORDERS</a>
      </div>

      <div id="productGrid" class="grid">
        <div class="spinner"></div>
      </div>
    </div>

    <div id="modalOverlay" class="modal-overlay">
      <div class="modal-card">
        <div id="closeModalBtn" class="close-icon">✕</div>

        <div class="modal-header">
          <img id="modalImg" class="modal-img" src="" />
          <div class="modal-info">
            <h3 id="modalName">Product Name</h3>
            <span id="modalPrice">$0.00</span>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">MOBILE CONTACT</label>
          <input
            type="tel"
            id="mobileInput"
            class="modal-input"
            placeholder="+1 234 567 890"
          />
        </div>

        <div class="input-group">
          <label class="input-label">DELIVERY DESTINATION</label>
          <input
            type="text"
            id="addressInput"
            class="modal-input"
            placeholder="FULL STREET ADDRESS"
          />
        </div>

        <button id="confirmBtn" class="modal-btn">CLAIM REWARD</button>
      </div>
    </div>

    <script type="module">
      import { supabase } from "./supabaseClient.js";
      import { UserContext } from "./userContext.js";

      const grid = document.getElementById("productGrid");
      const userBalEl = document.getElementById("userBal");
      const modalOverlay = document.getElementById("modalOverlay");
      const modalImg = document.getElementById("modalImg");
      const modalName = document.getElementById("modalName");
      const modalPrice = document.getElementById("modalPrice");
      const mobileInput = document.getElementById("mobileInput");
      const addressInput = document.getElementById("addressInput");
      const confirmBtn = document.getElementById("confirmBtn");
      const closeModalBtn = document.getElementById("closeModalBtn");

      let currentUser = null;
      let products = [];
      let selectedProduct = null;

      async function init() {
        currentUser = UserContext.getUser();
        if (!currentUser) {
          window.location.href = "index.html";
          return;
        }
        await Promise.all([fetchUserBalance(), fetchProducts()]);
      }

      async function fetchUserBalance() {
        const { data } = await supabase
          .from("users")
          .select("withdrawal_amount")
          .eq("id", currentUser.id)
          .single();
        if (data) {
          currentUser.withdrawal_amount = data.withdrawal_amount;
          userBalEl.innerText = `$${data.withdrawal_amount.toFixed(2)}`;
        }
      }

      async function fetchProducts() {
        try {
          const { data } = await supabase.from("products").select("*");
          products = data || [];
          renderGrid();
        } catch (err) {
          grid.innerHTML =
            '<div style="color:var(--gold-metallic); text-align:center; grid-column:1/-1; font-family: JetBrains Mono;">[ ERR: STORE OFFLINE ]</div>';
        }
      }

      function renderGrid() {
        if (products.length === 0) {
          grid.innerHTML =
            '<div style="color:var(--text-grey); text-align:center; grid-column:1/-1; padding:40px; font-weight:700; letter-spacing:1px;">SUPPLY CHAIN EMPTY</div>';
          return;
        }

        grid.innerHTML = products
          .map(
            (item, index) => `
                <div class="card" onclick="window.openModal(${index})">
                    <div class="img-box">
                        <img src="${item.image_url}" class="prod-img" loading="lazy">
                    </div>
                    <div class="info-box">
                        <div class="prod-title">${item.name}</div>
                        <div class="prod-price">$${item.price}</div>
                        <button class="claim-btn">CLAIM</button>
                    </div>
                </div>
            `
          )
          .join("");
      }

      window.openModal = (index) => {
        selectedProduct = products[index];
        if ((currentUser.withdrawal_amount || 0) < selectedProduct.price) {
          alert(
            `INSUFFICIENT FUNDS. REQUIRED: $${(
              selectedProduct.price - currentUser.withdrawal_amount
            ).toFixed(2)}`
          );
          return;
        }
        modalImg.src = selectedProduct.image_url;
        modalName.innerText = selectedProduct.name;
        modalPrice.innerText = `$${selectedProduct.price}`;
        modalOverlay.style.display = "flex";
      };

      function closeModal() {
        modalOverlay.style.display = "none";
        mobileInput.value = "";
        addressInput.value = "";
      }

      async function handleClaim() {
        const mobile = mobileInput.value.trim();
        const location = addressInput.value.trim();

        if (!mobile || !location) {
          alert("LOGISTICS DATA REQUIRED");
          return;
        }

        confirmBtn.innerText = "PROCESSING...";
        confirmBtn.disabled = true;

        try {
          const { error: purchaseError } = await supabase
            .from("purchases")
            .insert([
              {
                user_id: currentUser.id,
                product_id: selectedProduct.id,
                mobile: mobile,
                location: location,
                status: "pending",
              },
            ]);

          if (purchaseError) throw purchaseError;

          alert("ORDER CONFIRMED IN LEDGER");
          closeModal();
          fetchUserBalance();
        } catch (err) {
          alert("ERROR: " + err.message);
        } finally {
          confirmBtn.innerText = "CLAIM REWARD";
          confirmBtn.disabled = false;
        }
      }

      closeModalBtn.addEventListener("click", closeModal);
      confirmBtn.addEventListener("click", handleClaim);
      init();
    </script>
  </body>
</html>
