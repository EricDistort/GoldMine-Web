<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Store</title>
    <style>
        /* --- GLOBAL RESET --- */
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #050505;
            color: #fff;
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            padding-bottom: 80px;
        }

        /* --- NAVIGATION --- */
        .nav-bar {
            margin-bottom: 15px;
        }
        .back-btn {
            background: none;
            border: none;
            color: #ff00d4;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            padding: 10px 0;
        }

        /* --- HEADER --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .title {
            font-size: 28px;
            font-weight: 800;
            margin: 0;
            letter-spacing: 0.5px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            margin-top: 4px;
        }

        .history-btn {
            padding: 6px 12px;
            background-color: rgba(255, 0, 212, 0.1);
            border-radius: 20px;
            border: 1px solid rgba(255, 0, 212, 0.3);
            text-decoration: none;
            cursor: pointer;
        }

        .order-list-text {
            font-size: 12px;
            color: #ff00d4;
            font-weight: 700;
        }

        /* --- PRODUCT GRID --- */
        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        /* --- PRODUCT CARD --- */
        .card-container {
            border-radius: 16px;
            background: linear-gradient(135deg, #7b0094, #ff00d4);
            padding: 1px; /* Border effect */
            box-shadow: 0 4px 8px rgba(255, 0, 212, 0.15);
        }

        .card-inner {
            background-color: #121212;
            border-radius: 15px;
            padding: 8px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .image-container {
            width: 100%;
            height: 110px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 8px;
            background-color: #000;
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding: 0 2px;
        }

        .product-name {
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            margin-right: 4px;
        }

        .product-price {
            font-size: 13px;
            color: #ff00d4;
            font-weight: 800;
        }

        .claim-btn {
            background: linear-gradient(90deg, #7b0094, #ff00d4);
            border: none;
            border-radius: 8px;
            width: 100%;
            padding: 8px 0;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .claim-btn:active {
            transform: scale(0.95);
        }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.8);
            z-index: 1000;
            display: none; /* Hidden by default */
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.2s;
        }

        .modal-content {
            width: 90%;
            max-width: 400px;
            background: linear-gradient(180deg, #1a1a1a, #0d0d0d);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 800;
            margin: 0;
        }

        .close-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            font-size: 24px;
            cursor: pointer;
            line-height: 1;
        }

        .product-summary {
            display: flex;
            align-items: center;
            background-color: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .summary-img {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            margin-right: 12px;
            object-fit: cover;
            background-color: #000;
        }

        .summary-name {
            font-size: 16px;
            font-weight: 700;
            display: block;
            margin-bottom: 4px;
        }

        .summary-price {
            font-size: 16px;
            font-weight: 800;
            color: #ff00d4;
        }

        .divider {
            height: 1px;
            background-color: rgba(255,255,255,0.1);
            margin-bottom: 15px;
        }

        .input-label {
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            margin-bottom: 6px;
            display: block;
        }

        .input-field {
            width: 100%;
            background-color: #000;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 12px 15px;
            color: #fff;
            font-size: 14px;
            margin-bottom: 15px;
            outline: none;
        }

        .input-field:focus {
            border-color: #ff00d4;
        }

        .confirm-btn {
            width: 100%;
            background: linear-gradient(90deg, #7b0094, #ff00d4);
            border: none;
            border-radius: 12px;
            padding: 14px;
            color: #fff;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .confirm-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loader {
            text-align: center;
            color: #ff00d4;
            margin-top: 50px;
        }

    </style>
</head>
<body>

    <div class="container">
        
        <div class="nav-bar">
            <a href="main.html" class="back-btn">← Back</a>
        </div>

        <div class="header">
            <div>
                <h1 class="title">Store</h1>
                <p class="subtitle">Redeem your rewards</p>
            </div>
            <a href="orders.html" class="history-btn">
                <span class="order-list-text">My Orders</span>
            </a>
        </div>

        <div id="productGrid" class="product-grid">
            <div class="loader">Loading items...</div>
        </div>

    </div>

    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Confirm Claim</h3>
                <button id="closeModalBtn" class="close-btn">✕</button>
            </div>

            <div class="product-summary">
                <img id="modalImg" class="summary-img" src="">
                <div>
                    <span id="modalName" class="summary-name">Product Name</span>
                    <span id="modalPrice" class="summary-price">$0</span>
                </div>
            </div>

            <div class="divider"></div>

            <label class="input-label">Mobile Number</label>
            <input type="tel" id="mobileInput" class="input-field" placeholder="Enter contact number">

            <label class="input-label">Delivery Address</label>
            <input type="text" id="addressInput" class="input-field" placeholder="Enter full address">

            <button id="confirmBtn" class="confirm-btn">Confirm & Claim</button>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';
        import { UserContext } from './userContext.js';

        // DOM Elements
        const grid = document.getElementById('productGrid');
        const modal = document.getElementById('modalOverlay');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const confirmBtn = document.getElementById('confirmBtn');
        
        // Modal Inputs
        const modalImg = document.getElementById('modalImg');
        const modalName = document.getElementById('modalName');
        const modalPrice = document.getElementById('modalPrice');
        const mobileInput = document.getElementById('mobileInput');
        const addressInput = document.getElementById('addressInput');

        // State
        let currentUser = null;
        let products = [];
        let selectedProduct = null;

        async function init() {
            currentUser = UserContext.getUser();
            if (!currentUser) {
                window.location.href = 'index.html';
                return;
            }

            // Refresh user balance to ensure accuracy
            await fetchUserBalance();
            await fetchProducts();
        }

        async function fetchUserBalance() {
            const { data } = await supabase
                .from('users')
                .select('withdrawal_amount')
                .eq('id', currentUser.id)
                .single();
            
            if (data) {
                currentUser.withdrawal_amount = data.withdrawal_amount;
                UserContext.setUser(currentUser);
            }
        }

        async function fetchProducts() {
            try {
                const { data, error } = await supabase.from('products').select('*');
                if (error) throw error;
                products = data || [];
                renderGrid();
            } catch (err) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center;">Error loading products</div>';
            }
        }

        function renderGrid() {
            if (products.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; color:#666;">No items available</div>';
                return;
            }

            grid.innerHTML = products.map((item, index) => `
                <div class="card-container">
                    <div class="card-inner">
                        <div class="image-container">
                            <img src="${item.image_url}" class="product-image" loading="lazy">
                        </div>
                        <div class="card-content">
                            <span class="product-name">${item.name}</span>
                            <span class="product-price">$${item.price}</span>
                        </div>
                        <button class="claim-btn" onclick="window.openClaimModal(${index})">Claim</button>
                    </div>
                </div>
            `).join('');
        }

        // Exposed function for inline onclick
        window.openClaimModal = (index) => {
            selectedProduct = products[index];
            
            // Check Balance
            if ((currentUser.withdrawal_amount || 0) < selectedProduct.price) {
                alert('Insufficient Balance. You need more funds to claim this item.');
                return;
            }

            // Populate Modal
            modalImg.src = selectedProduct.image_url;
            modalName.innerText = selectedProduct.name;
            modalPrice.innerText = `$${selectedProduct.price}`;
            
            modal.style.display = 'flex';
        };

        function closeModal() {
            modal.style.display = 'none';
            selectedProduct = null;
            mobileInput.value = '';
            addressInput.value = '';
        }

        async function handleConfirm() {
            const mobile = mobileInput.value.trim();
            const location = addressInput.value.trim();

            if (!mobile || !location) {
                alert('Please fill in mobile number and address.');
                return;
            }

            confirmBtn.innerHTML = '<div class="spinner"></div>';
            confirmBtn.disabled = true;

            try {
                const { error } = await supabase.from('purchases').insert([{
                    user_id: currentUser.id,
                    product_id: selectedProduct.id,
                    mobile: mobile,
                    location: location,
                    status: 'pending'
                }]);

                if (error) throw error;

                alert('Claim request submitted successfully!');
                closeModal();

            } catch (err) {
                alert(err.message);
            } finally {
                confirmBtn.innerHTML = 'Confirm & Claim';
                confirmBtn.disabled = false;
            }
        }

        // Listeners
        closeModalBtn.addEventListener('click', closeModal);
        confirmBtn.addEventListener('click', handleConfirm);
        
        // Close on background click
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        // Run
        init();
    </script>
</body>
</html>
