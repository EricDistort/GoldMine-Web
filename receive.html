<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>My Network | Quantum Core</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* --- FOUNDRY CORE DESIGN SYSTEM --- */
      :root {
        --bg-top: #000000;
        --bg-mid: #0a0500;
        --bg-bottom: #140a00;
        
        --gold-metallic: #d4af37;
        --gold-bright: #ffd700;
        --gold-dark: #b8860b;
        
        --status-green: #00ff88;
        --status-red: #ff4500;
        --status-blue: #00f2ff;
        
        --card-bg: #080808;
        --glass-border: rgba(255, 215, 0, 0.15);
        --text-grey: #8b8b8b;
        
        --radius-app: 25px;
      }

      /* --- GLOBAL RESET --- */
      * {
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
        -webkit-tap-highlight-color: transparent;
        outline: none;
      }

      body {
        background: linear-gradient(
          180deg,
          var(--bg-top) 0%,
          var(--bg-mid) 50%,
          var(--bg-bottom) 100%
        );
        background-attachment: fixed;
        color: #fff;
        margin: 0;
        padding: 0;
        min-height: 100vh;
      }

      .page-wrapper {
        width: 100%;
        max-width: 1000px;
        margin: 0 auto;
        padding: 20px;
        padding-bottom: 80px;
      }

      /* --- NAV --- */
      .nav-bar {
        display: flex;
        align-items: center;
        margin-bottom: 30px;
        margin-top: 10px;
      }
      .back-btn {
        background: rgba(255, 215, 0, 0.05);
        border: 1px solid rgba(255, 215, 0, 0.2);
        color: var(--gold-bright);
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        padding: 10px 20px;
        border-radius: 30px;
        text-decoration: none;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 8px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .back-btn:hover {
        background: rgba(255, 215, 0, 0.15);
        border-color: var(--gold-bright);
        box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        transform: translateX(-3px);
      }

      /* --- HEADER --- */
      .header {
        margin-bottom: 35px;
        text-align: left;
        padding-left: 5px;
      }
      .header-title {
        font-size: 36px;
        font-weight: 800;
        margin: 0;
        color: var(--gold-metallic);
        letter-spacing: 2px;
        text-transform: uppercase;
        text-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
      }
      .header-subtitle {
        color: var(--text-grey);
        font-size: 10px;
        margin-top: 5px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
        opacity: 0.7;
      }
      .header-line {
        height: 3px;
        width: 60px;
        border-radius: 2px;
        background: linear-gradient(90deg, var(--gold-bright), transparent);
        margin-top: 15px;
        box-shadow: 0 0 10px var(--gold-dark);
      }

      /* --- SEARCH --- */
      .search-bar {
        width: 100%;
        height: 60px;
        margin-bottom: 30px;
        background: #050505;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 18px;
        padding: 0 20px;
        display: flex;
        align-items: center;
        gap: 15px;
        transition: all 0.3s ease;
        box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
      }
      .search-bar:focus-within {
        border-color: var(--gold-bright);
        box-shadow: 0 0 15px rgba(255, 215, 0, 0.15);
        background: #000;
      }
      
      .search-icon {
        font-size: 18px;
        color: var(--gold-metallic);
        opacity: 0.8;
      }
      .search-input {
        background: transparent;
        border: none;
        color: #fff;
        flex: 1;
        font-size: 15px;
        font-weight: 500;
      }
      .search-input::placeholder {
        color: #444;
        text-transform: uppercase;
        font-size: 12px;
        letter-spacing: 1px;
      }

      /* --- GRID --- */
      .network-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
      }

      /* --- CARD --- */
      .card {
        background: linear-gradient(145deg, #0e0e0e, #050505);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-app);
        padding: 20px;
        display: flex;
        align-items: center;
        gap: 18px;
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        position: relative;
        overflow: hidden;
      }
      
      /* Card Hover Physics */
      .card:hover {
        transform: translateY(-5px) scale(1.02);
        border-color: var(--gold-bright);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), 0 0 15px rgba(255, 215, 0, 0.1);
        background: linear-gradient(145deg, #15100a, #050505);
      }
      .card:active {
        transform: scale(0.98);
      }

      /* Avatar */
      .avatar-box {
        width: 55px;
        height: 55px;
        border-radius: 50%;
        background: #000;
        border: 1px solid rgba(255, 215, 0, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        font-weight: 800;
        color: var(--gold-bright);
        position: relative;
        transition: 0.3s;
        box-shadow: inset 0 0 10px rgba(255, 215, 0, 0.1);
      }
      .card:hover .avatar-box {
        border-color: var(--gold-bright);
        box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
      }
      
      .avatar-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 50%;
      }

      .avatar-box::after {
        content: "";
        position: absolute;
        bottom: 2px;
        right: 2px;
        width: 12px;
        height: 12px;
        background: var(--status-green);
        border: 2px solid #000;
        border-radius: 50%;
        box-shadow: 0 0 5px var(--status-green);
      }

      /* Info */
      .user-info {
        flex: 1;
        min-width: 0;
      }
      .username {
        font-size: 16px;
        font-weight: 800;
        color: #fff;
        margin-bottom: 4px;
        letter-spacing: 0.5px;
      }
      .user-id {
        font-family: "JetBrains Mono";
        font-size: 11px;
        color: var(--text-grey);
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      /* Stats */
      .volume-box {
        text-align: right;
      }
      .vol-label {
        font-size: 9px;
        color: var(--text-grey);
        text-transform: uppercase;
        font-weight: 800;
        margin-bottom: 4px;
        letter-spacing: 1px;
      }
      .vol-val {
        font-family: "JetBrains Mono";
        font-size: 16px;
        font-weight: 800;
        color: var(--gold-bright);
        text-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
      }

      /* Arrow */
      .arrow-icon {
        color: var(--gold-dark);
        font-size: 20px;
        font-weight: 300;
        opacity: 0.5;
        transition: 0.3s;
      }
      .card:hover .arrow-icon {
        color: var(--gold-bright);
        opacity: 1;
        transform: translateX(3px);
      }

      /* Skeleton */
      .skeleton {
        height: 95px;
        background: #080808;
        border-radius: var(--radius-app);
        border: 1px solid rgba(255, 255, 255, 0.05);
        position: relative;
        overflow: hidden;
      }
      .skeleton::after {
        content: "";
        position: absolute;
        top: 0; right: 0; bottom: 0; left: 0;
        transform: translateX(-100%);
        background-image: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0) 0,
          rgba(255, 255, 255, 0.03) 20%,
          rgba(255, 255, 255, 0.06) 60%,
          rgba(255, 255, 255, 0)
        );
        animation: shimmer 2s infinite;
      }

      @keyframes shimmer {
        100% { transform: translateX(100%); }
      }

      @media (max-width: 600px) {
        .header-title {
          font-size: 28px;
        }
        .network-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-wrapper">
      <div class="nav-bar">
        <a href="main.html" class="back-btn pop-click">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="3"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M15 18l-6-6 6-6" />
          </svg>
          DASHBOARD
        </a>
      </div>

      <div class="header">
        <h1 class="header-title">MY NETWORK</h1>
        <p class="header-subtitle">DIRECT REFERRALS & TEAM PERFORMANCE</p>
        <div class="header-line"></div>
      </div>

      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          class="search-input"
          placeholder="SEARCH BY USERNAME OR ID..."
        />
      </div>

      <div id="referralsList" class="network-grid">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    </div>

    <script type="module">
      import { supabase } from "./supabaseClient.js";
      import { UserContext } from "./userContext.js";

      const listEl = document.getElementById("referralsList");

      async function init() {
        const currentUser = UserContext.getUser();
        if (!currentUser) {
          window.location.href = "index.html";
          return;
        }

        try {
          const { data, error } = await supabase
            .from("users")
            .select(
              "id, username, direct_business, account_number, profileImage"
            )
            .eq("referrer_account_number", currentUser.account_number);

          if (error) throw error;

          if (data && data.length > 0) renderList(data);
          else
            listEl.innerHTML = `
                    <div style="text-align:center; padding:80px 20px; opacity:0.6; grid-column:1/-1;">
                        <span style="font-size:50px; display:block; margin-bottom:20px; filter: grayscale(1);">🌐</span>
                        <h3 style="color:var(--gold-metallic); letter-spacing:2px; font-size:16px; margin-bottom:5px;">NO DATA FOUND</h3>
                        <p style="font-size:11px; color:var(--text-grey); font-family: 'JetBrains Mono';">EXPAND YOUR NETWORK TO VISUALIZE DATA</p>
                    </div>`;
        } catch (err) {
          console.error(err);
          listEl.innerHTML =
            '<div style="text-align:center; color:var(--gold-metallic); margin-top:40px; font-family: JetBrains Mono;">[ ERR: LEDGER ACCESS DENIED ]</div>';
        }
      }

      function renderList(users) {
        listEl.innerHTML = users
          .map((user) => {
            const initial = (user.username || "U").charAt(0).toUpperCase();
            const avatarContent = user.profileImage
              ? `<img src="${user.profileImage}" class="avatar-img">`
              : initial;

            return `
                    <div class="card pop-click" onclick="alert('Viewing profile: ${
                      user.username
                    }')">
                        <div class="avatar-box">
                            ${avatarContent}
                        </div>
                        <div class="user-info">
                            <div class="username">${
                              user.username || "Unknown Operator"
                            }</div>
                            <div class="user-id">ID: ${
                              user.account_number
                            }</div>
                        </div>
                        <div class="volume-box">
                            <span class="vol-label">VOLUME</span>
                            <div class="vol-val">$${
                              user.direct_business || 0
                            }</div>
                        </div>
                        <div class="arrow-icon">›</div>
                    </div>`;
          })
          .join("");
      }

      init();
    </script>
  </body>
</html>
