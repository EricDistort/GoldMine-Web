<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Withdraw | Quantum Core</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      /* --- FOUNDRY CORE DESIGN SYSTEM --- */
      :root {
        --bg-top: #000000;
        --bg-mid: #0a0500;
        --bg-bottom: #140a00;
        
        --gold-metallic: #d4af37;
        --gold-bright: #ffd700;
        --gold-dark: #b8860b;
        
        --status-green: #00ff88;
        --status-red: #ff4500;
        --status-pending: #ffae00;
        
        --card-bg: #080808;
        --glass-border: rgba(255, 215, 0, 0.15);
        --text-grey: #8b8b8b;
        
        --radius-app: 25px;
      }

      /* --- GLOBAL RESET --- */
      * {
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
        -webkit-tap-highlight-color: transparent;
        outline: none;
      }

      body {
        background: linear-gradient(
          180deg,
          var(--bg-top) 0%,
          var(--bg-mid) 50%,
          var(--bg-bottom) 100%
        );
        background-attachment: fixed;
        color: #fff;
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container {
        width: 100%;
        max-width: 500px;
        padding: 20px;
        padding-bottom: 80px;
      }

      /* --- NAVIGATION --- */
      .nav-bar {
        margin-bottom: 30px;
        margin-top: 10px;
      }
      .back-btn {
        background: rgba(255, 215, 0, 0.05);
        border: 1px solid rgba(255, 215, 0, 0.2);
        color: var(--gold-bright);
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
        padding: 10px 20px;
        border-radius: 30px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s ease;
      }
      .back-btn:hover {
        background: rgba(255, 215, 0, 0.15);
        border-color: var(--gold-bright);
        box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        transform: translateX(-3px);
      }

      .page-title {
        font-size: 32px;
        font-weight: 800;
        color: var(--gold-metallic);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 5px;
        text-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
      }

      .page-subtitle {
        color: var(--text-grey);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 35px;
        opacity: 0.7;
      }

      /* --- BALANCE CARD --- */
      .balance-card {
        background: linear-gradient(135deg, #1a1005 0%, #000000 100%);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-app);
        padding: 24px;
        margin-bottom: 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        transition: 0.3s ease;
      }
      .balance-card:hover {
        border-color: var(--gold-dark);
        box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8), 0 0 10px rgba(212, 175, 55, 0.1);
        transform: translateY(-2px);
      }

      .balance-label {
        color: var(--text-grey);
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        margin-bottom: 5px;
        letter-spacing: 1px;
        display: block;
      }

      .balance-value {
        font-family: "JetBrains Mono";
        font-size: 42px;
        font-weight: 800;
        color: #fff;
        margin: 0;
        letter-spacing: -1px;
        text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
      }

      .icon-container {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background-color: rgba(255, 215, 0, 0.05);
        border: 1px solid rgba(255, 215, 0, 0.2);
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 24px;
        color: var(--gold-bright);
        font-weight: bold;
        box-shadow: 0 0 15px rgba(0,0,0,0.5);
      }

      /* --- FORM --- */
      .form-container {
        display: flex;
        flex-direction: column;
        gap: 20px;
        margin-bottom: 40px;
      }

      .input-field {
        background-color: #050505;
        border-radius: 18px;
        height: 60px;
        padding: 0 20px;
        color: #fff;
        font-size: 16px;
        font-weight: 600;
        border: 1px solid rgba(255, 255, 255, 0.1);
        width: 100%;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
      }

      .input-field:focus {
        border-color: var(--gold-bright);
        box-shadow: 0 0 15px rgba(255, 215, 0, 0.15);
        background-color: #000;
      }
      
      .input-field::placeholder {
        color: #444;
        font-weight: 500;
        text-transform: uppercase;
        font-size: 12px;
        letter-spacing: 1px;
      }

      .amount-row {
        position: relative;
      }

      .max-btn {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(255, 215, 0, 0.1);
        color: var(--gold-bright);
        border: 1px solid var(--gold-dark);
        border-radius: 12px;
        padding: 8px 16px;
        font-size: 11px;
        font-weight: 800;
        cursor: pointer;
        transition: 0.2s;
        letter-spacing: 0.5px;
      }
      .max-btn:hover {
        background: var(--gold-bright);
        color: #000;
        box-shadow: 0 0 10px var(--gold-bright);
      }

      .submit-btn {
        width: 100%;
        height: 60px;
        border-radius: 18px;
        border: none;
        background: linear-gradient(
          90deg,
          var(--gold-metallic),
          var(--gold-bright),
          var(--gold-dark)
        );
        background-size: 200% auto;
        color: #000;
        font-size: 14px;
        font-weight: 900;
        letter-spacing: 2px;
        cursor: pointer;
        box-shadow: 0 10px 30px rgba(184, 134, 11, 0.3);
        transition: all 0.3s ease;
        margin-top: 10px;
        text-transform: uppercase;
      }

      .submit-btn:hover {
        background-position: right center;
        box-shadow: 0 0 25px rgba(255, 215, 0, 0.5);
        transform: translateY(-2px);
      }
      .submit-btn:active {
        transform: scale(0.98);
      }

      /* --- HISTORY --- */
      .history-header {
        display: flex;
        align-items: center;
        margin-bottom: 25px;
      }

      .section-title {
        font-size: 14px;
        font-weight: 800;
        color: var(--gold-metallic);
        text-transform: uppercase;
        margin-right: 15px;
        letter-spacing: 2px;
      }

      .line {
        flex: 1;
        height: 2px;
        background: linear-gradient(90deg, var(--gold-dark), transparent);
        border-radius: 2px;
        opacity: 0.5;
      }

      .history-card {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-app);
        padding: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      
      .history-card:hover {
        background: linear-gradient(90deg, #0e0e0e, #050505);
        border-color: var(--gold-bright);
        transform: translateX(5px);
        box-shadow: 0 5px 20px rgba(0,0,0,0.5);
      }

      .history-amount {
        font-family: "JetBrains Mono";
        font-size: 18px;
        font-weight: 700;
        color: #fff;
        margin-bottom: 4px;
        display: block;
        letter-spacing: -0.5px;
      }
      .history-date {
        font-size: 10px;
        color: var(--text-grey);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .status-badge {
        padding: 6px 12px;
        border-radius: 8px;
        border: 1px solid;
        font-size: 9px;
        font-weight: 800;
        text-transform: uppercase;
        margin-bottom: 8px;
        display: inline-block;
        letter-spacing: 1px;
      }

      .wallet-truncated {
        font-family: "JetBrains Mono";
        color: rgba(255, 255, 255, 0.3);
        font-size: 10px;
        max-width: 120px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        display: block;
      }

      /* --- OVERLAYS --- */
      .success-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.95);
        backdrop-filter: blur(10px);
        z-index: 1000;
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        animation: fadeIn 0.4s ease-out;
      }

      .checkmark-circle {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: var(--status-green);
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 30px;
        box-shadow: 0 0 50px rgba(0, 255, 136, 0.5);
        animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .success-text {
        font-size: 20px;
        font-weight: 900;
        color: var(--gold-bright);
        letter-spacing: 3px;
        text-transform: uppercase;
        text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
      }

      .spinner {
        width: 24px;
        height: 24px;
        border: 3px solid rgba(0, 0, 0, 0.1);
        border-top-color: #000;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes popIn {
        from { transform: scale(0.5); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="successOverlay" class="success-overlay">
      <div class="checkmark-circle">
        <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <div class="success-text">REQUEST SENT</div>
    </div>

    <div class="container">
      <div class="nav-bar">
        <a href="main.html" class="back-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
            BACK
        </a>
      </div>

      <h1 class="page-title">WITHDRAW</h1>
      <p class="page-subtitle">SECURE ASSET LIQUIDATION</p>

      <div class="balance-card">
        <div>
          <span class="balance-label">Available Liquidity</span>
          <h1 id="totalBalance" class="balance-value">0.00</h1>
        </div>
        <div class="icon-container">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="1" x2="12" y2="23"></line>
                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
            </svg>
        </div>
      </div>

      <div class="form-container">
        <input
          type="text"
          id="walletInput"
          class="input-field"
          placeholder="WALLET ADDRESS (TRC20/ERC20)"
          autocomplete="off"
        />

        <div class="amount-row">
          <input
            type="number"
            id="amountInput"
            class="input-field"
            placeholder="AMOUNT (USD)"
          />
          <button id="maxBtn" class="max-btn">MAX</button>
        </div>

        <button id="submitBtn" class="submit-btn">INITIATE TRANSFER</button>
      </div>

      <div class="history-header">
        <span class="section-title">TRANSACTION LOGS</span>
        <div class="line"></div>
      </div>

      <div id="historyList" class="history-list">
        <div
          style="
            text-align: center;
            color: var(--text-grey);
            font-size: 12px;
            font-family: 'JetBrains Mono';
            margin-top: 30px;
            opacity: 0.6;
          "
        >
          [ ACCESSING SECURE LEDGER... ]
        </div>
      </div>
    </div>

    <script type="module">
      import { supabase } from "./supabaseClient.js";
      import { UserContext } from "./userContext.js";

      const els = {
        balance: document.getElementById("totalBalance"),
        wallet: document.getElementById("walletInput"),
        amount: document.getElementById("amountInput"),
        maxBtn: document.getElementById("maxBtn"),
        submitBtn: document.getElementById("submitBtn"),
        historyList: document.getElementById("historyList"),
        successOverlay: document.getElementById("successOverlay"),
      };

      let currentUser = null;
      let currentBalance = 0;

      async function init() {
        currentUser = UserContext.getUser();
        if (!currentUser) {
          window.location.href = "index.html";
          return;
        }
        await Promise.all([fetchUserBalance(), fetchWithdrawals()]);
      }

      async function fetchUserBalance() {
        try {
          const { data, error } = await supabase
            .from("users")
            .select("withdrawal_amount")
            .eq("id", currentUser.id)
            .single();

          if (data && !error) {
            currentBalance = data.withdrawal_amount || 0;
            els.balance.innerText = currentBalance.toFixed(2);
            UserContext.setUser({
              ...currentUser,
              withdrawal_amount: currentBalance,
            });
          }
        } catch (err) {
          console.error(err);
        }
      }

      async function fetchWithdrawals() {
        try {
          const { data, error } = await supabase
            .from("withdrawals")
            .select("id, receiving_wallet, amount, status, created_at")
            .eq("user_id", currentUser.id)
            .order("created_at", { ascending: false })
            .limit(20);

          if (!error) renderHistory(data || []);
        } catch (err) {
          console.error(err);
        }
      }

      function renderHistory(list) {
        if (list.length === 0) {
          els.historyList.innerHTML =
            '<div style="text-align:center; color:var(--gold-metallic); opacity:0.5; margin-top:30px; font-size:12px; font-weight:700; letter-spacing:1px;">NO TRANSACTIONS FOUND</div>';
          return;
        }

        els.historyList.innerHTML = list
          .map((item) => {
            const date = new Date(item.created_at).toLocaleDateString();
            const color = getStatusColor(item.status);

            return `
                <div class="history-card">
                    <div>
                        <span class="history-amount">$${item.amount}</span>
                        <span class="history-date">${date} • WITHDRAWAL</span>
                    </div>
                    <div style="text-align: right">
                        <div class="status-badge" style="color: ${color}; border-color: ${color}; background-color: ${color}15; box-shadow: 0 0 10px ${color}20;">
                            ${item.status}
                        </div>
                        <span class="wallet-truncated">${item.receiving_wallet}</span>
                    </div>
                </div>`;
          })
          .join("");
      }

      async function handleSubmit() {
        const wallet = els.wallet.value.trim();
        const amountVal = parseFloat(els.amount.value);

        if (!wallet || isNaN(amountVal) || amountVal <= 0) {
          alert("INVALID PARAMETERS DETECTED");
          return;
        }

        if (amountVal > currentBalance) {
          alert("INSUFFICIENT LIQUIDITY");
          return;
        }

        setLoading(true);
        try {
          const { error } = await supabase.from("withdrawals").insert([
            {
              user_id: currentUser.id,
              receiving_wallet: wallet,
              amount: amountVal,
            },
          ]);
          if (error) throw error;

          showSuccessAnim();
          els.wallet.value = "";
          els.amount.value = "";
          await Promise.all([fetchUserBalance(), fetchWithdrawals()]);
        } catch (err) {
          alert(err.message);
        } finally {
          setLoading(false);
        }
      }

      function setLoading(isLoading) {
        if (isLoading) {
          els.submitBtn.innerHTML = '<div class="spinner"></div>';
          els.submitBtn.disabled = true;
        } else {
          els.submitBtn.innerHTML = "INITIATE TRANSFER";
          els.submitBtn.disabled = false;
        }
      }

      function getStatusColor(status) {
        if (status === "approved") return "#00ff88";
        if (status === "pending") return "#ffae00";
        if (status === "rejected") return "#ff4500";
        return "#8B8B8B";
      }

      function showSuccessAnim() {
        els.successOverlay.style.display = "flex";
        setTimeout(() => {
          els.successOverlay.style.display = "none";
        }, 2500);
      }

      els.maxBtn.addEventListener("click", () => {
        els.amount.value = currentBalance;
      });
      els.submitBtn.addEventListener("click", handleSubmit);
      init();
    </script>
  </body>
</html>
