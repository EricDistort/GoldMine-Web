<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Track Orders | Quantum Core</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* --- FOUNDRY CORE DESIGN SYSTEM --- */
      :root {
        --bg-top: #000000;
        --bg-mid: #0a0500;
        --bg-bottom: #140a00;
        
        --gold-metallic: #d4af37;
        --gold-bright: #ffd700;
        --gold-dark: #b8860b;
        
        --status-pending: #ffae00;
        --status-packed: #00f2ff;
        --status-shipping: #b8860b;
        --status-done: #00ff88;
        
        --card-bg: #080808;
        --glass-border: rgba(255, 215, 0, 0.15);
        --text-grey: #8b8b8b;
        
        --radius-app: 25px;
      }

      /* --- GLOBAL RESET --- */
      * {
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
        -webkit-tap-highlight-color: transparent;
        outline: none;
      }

      body {
        background: linear-gradient(
          180deg,
          var(--bg-top) 0%,
          var(--bg-mid) 50%,
          var(--bg-bottom) 100%
        );
        background-attachment: fixed;
        color: #fff;
        margin: 0;
        padding: 0;
        min-height: 100vh;
      }

      .page-wrapper {
        width: 100%;
        max-width: 1000px;
        margin: 0 auto;
        padding: 20px;
        padding-bottom: 80px;
      }

      /* --- NAV --- */
      .nav-bar {
        display: flex;
        align-items: center;
        margin-bottom: 30px;
        margin-top: 10px;
      }
      .back-btn {
        background: rgba(255, 215, 0, 0.05);
        border: 1px solid rgba(255, 215, 0, 0.2);
        color: var(--gold-bright);
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        padding: 10px 20px;
        border-radius: 30px;
        text-decoration: none;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 8px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .back-btn:hover {
        background: rgba(255, 215, 0, 0.15);
        border-color: var(--gold-bright);
        box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        transform: translateX(-3px);
      }

      /* --- HEADER --- */
      .header {
        margin-bottom: 40px;
        text-align: left;
        padding-left: 5px;
      }
      .header-title {
        font-size: 36px;
        font-weight: 800;
        margin: 0;
        color: var(--gold-metallic);
        letter-spacing: 2px;
        text-transform: uppercase;
        text-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
      }
      .header-subtitle {
        color: var(--text-grey);
        font-size: 10px;
        margin-top: 5px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
        opacity: 0.7;
      }
      .header-line {
        height: 3px;
        width: 60px;
        border-radius: 2px;
        background: linear-gradient(90deg, var(--gold-bright), transparent);
        margin-top: 15px;
        box-shadow: 0 0 10px var(--gold-dark);
      }

      /* --- ORDERS GRID --- */
      .orders-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 25px;
      }

      /* --- ORDER CARD --- */
      .order-card {
        background: linear-gradient(145deg, #0e0e0e, #050505);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-app);
        padding: 25px;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }
      
      .order-card:hover {
        transform: translateY(-8px) scale(1.01);
        border-color: var(--status-color);
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8), 0 0 15px var(--status-color);
      }

      /* Card Header */
      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }
      .date-badge {
        font-family: "JetBrains Mono";
        font-size: 10px;
        background: rgba(255, 255, 255, 0.05);
        padding: 6px 12px;
        border-radius: 12px;
        color: var(--text-grey);
        font-weight: 700;
        border: 1px solid rgba(255, 255, 255, 0.1);
        text-transform: uppercase;
      }

      .status-chip {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 16px;
        border-radius: 20px;
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid var(--status-color, #666);
        box-shadow: 0 0 10px var(--status-color, #666);
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--status-color, #666);
        box-shadow: 0 0 8px var(--status-color, #666);
        animation: pulse 2s infinite;
      }
      .status-text {
        font-size: 10px;
        font-weight: 800;
        color: var(--status-color, #fff);
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

      /* Product Info */
      .product-info {
        margin-bottom: 25px;
      }
      .prod-name {
        font-size: 20px;
        font-weight: 800;
        color: #fff;
        margin-bottom: 6px;
        display: block;
        letter-spacing: -0.5px;
      }
      .prod-price {
        font-family: "JetBrains Mono";
        font-size: 18px;
        font-weight: 800;
        color: var(--gold-bright);
        text-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
      }

      /* Progress Bar */
      .progress-container {
        margin-bottom: 25px;
      }
      .progress-track {
        width: 100%;
        height: 6px;
        background: #000;
        border-radius: 3px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(
          90deg,
          var(--gold-dark),
          var(--status-color)
        );
        border-radius: 3px;
        transition: width 1s ease;
        box-shadow: 0 0 10px var(--status-color);
      }
      .progress-labels {
        display: flex;
        justify-content: space-between;
        margin-top: 12px;
        font-size: 8px;
        color: var(--text-grey);
        text-transform: uppercase;
        font-weight: 800;
        letter-spacing: 1px;
      }

      /* Details Grid */
      .details-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        background: rgba(255, 255, 255, 0.03);
        border-radius: 18px;
        padding: 18px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: 0.3s;
      }
      .order-card:hover .details-grid {
        border-color: rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.05);
      }

      .detail-item {
        display: flex;
        flex-direction: column;
      }
      .detail-label {
        font-size: 9px;
        color: var(--text-grey);
        text-transform: uppercase;
        font-weight: 800;
        margin-bottom: 6px;
        letter-spacing: 1px;
      }
      .detail-val {
        font-family: "JetBrains Mono";
        font-size: 11px;
        color: #fff;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* --- SKELETON --- */
      .skeleton {
        height: 220px;
        background: #080808;
        border-radius: var(--radius-app);
        border: 1px solid rgba(255,255,255,0.05);
        position: relative;
        overflow: hidden;
      }
      .skeleton::after {
        content: "";
        position: absolute;
        top: 0; right: 0; bottom: 0; left: 0;
        transform: translateX(-100%);
        background-image: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0) 0,
          rgba(255, 255, 255, 0.03) 20%,
          rgba(255, 255, 255, 0.06) 60%,
          rgba(255, 255, 255, 0)
        );
        animation: shimmer 2s infinite;
      }

      @keyframes shimmer {
        100% { transform: translateX(100%); }
      }

      @media (max-width: 600px) {
        .header-title { font-size: 28px; }
        .orders-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="page-wrapper">
      <div class="nav-bar">
        <a href="store.html" class="back-btn">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="3"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M15 18l-6-6 6-6" />
          </svg>
          SUPPLY STORE
        </a>
      </div>

      <div class="header">
        <h1 class="header-title">TRACK ORDERS</h1>
        <p class="header-subtitle">REAL-TIME LOGISTICS & DELIVERY STATUS</p>
        <div class="header-line"></div>
      </div>

      <div id="ordersList" class="orders-grid">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    </div>

    <script type="module">
      import { supabase } from "./supabaseClient.js";
      import { UserContext } from "./userContext.js";

      const listEl = document.getElementById("ordersList");

      async function init() {
        const currentUser = UserContext.getUser();
        if (!currentUser) {
          window.location.href = "index.html";
          return;
        }

        try {
          const { data, error } = await supabase
            .from("purchases")
            .select(
              `id, mobile, location, status, created_at, product:products(name, price)`
            )
            .eq("user_id", currentUser.id)
            .order("created_at", { ascending: false });

          if (error) throw error;

          if (data && data.length > 0) renderOrders(data);
          else
            listEl.innerHTML = `
                    <div style="text-align:center; padding:100px 20px; opacity:0.6; grid-column:1/-1;">
                        <span style="font-size:50px; display:block; margin-bottom:20px; filter: grayscale(1);">📦</span>
                        <h3 style="color:var(--gold-metallic); letter-spacing:2px; font-size:16px; margin-bottom:5px;">NO ACTIVE SHIPMENTS</h3>
                        <p style="font-size:11px; color:var(--text-grey); font-family: 'JetBrains Mono';">YOUR REDEEMED ITEMS WILL APPEAR HERE</p>
                    </div>`;
        } catch (err) {
          console.error(err);
          listEl.innerHTML =
            '<div style="text-align:center; color:var(--gold-metallic); margin-top:40px; font-family: JetBrains Mono;">[ ERR: LOGISTICS ACCESS DENIED ]</div>';
        }
      }

      function getStatusConfig(status) {
        const s = status?.toLowerCase() || "pending";
        switch (s) {
          case "pending":
            return {
              color: "#FFae00",
              percent: "25%",
              label: "Processing",
            };
          case "packed":
            return {
              color: "#00f2ff",
              percent: "50%",
              label: "Secured",
            };
          case "out for delivery":
            return {
              color: "#b8860b",
              percent: "75%",
              label: "In Transit",
            };
          case "delivered":
            return {
              color: "#00ff88",
              percent: "100%",
              label: "Delivered",
            };
          default:
            return {
              color: "#8B8B8B",
              percent: "0%",
              label: "Verifying",
            };
        }
      }

      function renderOrders(orders) {
        listEl.innerHTML = orders
          .map((item) => {
            const config = getStatusConfig(item.status);
            const date = new Date(item.created_at).toLocaleDateString(
              undefined,
              { month: "short", day: "numeric", year: "numeric" }
            );
            const prodName = item.product?.name || "Unknown Item";
            const prodPrice = item.product?.price
              ? `$${item.product.price}`
              : "-";

            return `
                    <div class="order-card" style="--status-color: ${
                      config.color
                    }">
                        <div class="card-header">
                            <span class="date-badge">${date}</span>
                            <div class="status-chip">
                                <div class="status-dot"></div>
                                <span class="status-text">${config.label}</span>
                            </div>
                        </div>

                        <div class="product-info">
                            <span class="prod-name">${prodName}</span>
                            <span class="prod-price">${prodPrice}</span>
                        </div>

                        <div class="progress-container">
                            <div class="progress-track">
                                <div class="progress-fill" style="width: ${
                                  config.percent
                                }"></div>
                            </div>
                            <div class="progress-labels">
                                <span style="color:${
                                  config.percent === "25%" ? config.color : ""
                                }">Order</span>
                                <span style="color:${
                                  config.percent === "50%" ? config.color : ""
                                }">Secured</span>
                                <span style="color:${
                                  config.percent === "75%" ? config.color : ""
                                }">Transit</span>
                                <span style="color:${
                                  config.percent === "100%" ? config.color : ""
                                }">Success</span>
                            </div>
                        </div>

                        <div class="details-grid">
                            <div class="detail-item">
                                <span class="detail-label">Destination</span>
                                <span class="detail-val">${
                                  item.location || "---"
                                }</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Contact</span>
                                <span class="detail-val">${
                                  item.mobile || "---"
                                }</span>
                            </div>
                        </div>
                    </div>`;
          })
          .join("");
      }

      init();
    </script>
  </body>
</html>
