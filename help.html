<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Support</title>
    <style>
        /* --- GLOBAL RESET --- */
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #050505;
            color: #fff;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevent body scroll, handle in chat container */
        }

        /* --- HEADER --- */
        .header {
            padding: 20px 15px 15px 15px;
            background-color: #050505;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
            position: relative;
            z-index: 10;
        }

        .header-line {
            height: 2px;
            width: 30%;
            background: linear-gradient(90deg, #7b0094, #ff00d4);
            margin: 0 auto 10px auto;
            border-radius: 2px;
            opacity: 0.7;
        }

        .header-title {
            font-size: 20px;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- CHAT AREA --- */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
        }

        .empty-state {
            text-align: center;
            margin-top: 50px;
            opacity: 0.5;
            font-size: 14px;
            color: #fff;
        }

        /* --- BUBBLES --- */
        .message-bubble {
            padding: 12px 16px;
            border-radius: 16px;
            max-width: 85%;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* User Bubble (Right) */
        .user-bubble {
            background-color: #3a0047;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
            border: 1px solid #ff00d4;
            color: #fff;
        }

        /* Admin Bubble (Left) */
        .admin-bubble {
            background-color: #1a1a1a;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #eee;
        }

        /* --- INPUT AREA --- */
        .input-wrapper {
            padding: 15px;
            background-color: #000;
            flex-shrink: 0;
        }

        .input-row {
            display: flex;
            align-items: center;
            background-color: #121212;
            border-radius: 25px;
            padding: 5px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 15px;
            color: #fff;
            font-size: 16px; /* 16px prevents iOS zoom */
            outline: none;
        }

        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7b0094, #ff00d4);
            border: none;
            color: #fff;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(255, 0, 212, 0.5);
            transition: transform 0.1s;
        }

        .send-btn:active {
            transform: scale(0.9);
        }
        
        .send-btn:disabled {
            opacity: 0.5;
            cursor: default;
        }

        /* Loading Spinner */
        .spinner {
            width: 15px;
            height: 15px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #ff00d4;
            animation: spin 1s infinite linear;
            margin-left: 10px;
            display: none; /* Hidden by default */
        }

        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="header">
        <div class="header-line"></div>
        <h1 class="header-title">
            Live Support
            <div id="loadingSpinner" class="spinner"></div>
        </h1>
    </div>

    <div id="chatContainer" class="chat-container">
        </div>

    <div class="input-wrapper">
        <div class="input-row">
            <input type="text" id="messageInput" class="chat-input" placeholder="Type a message..." autocomplete="off">
            <button id="sendBtn" class="send-btn" disabled>➤</button>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';
        import { UserContext } from './userContext.js';

        // DOM Elements
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const loadingSpinner = document.getElementById('loadingSpinner');

        // State
        let currentUser = null;
        let conversationId = null;
        let messages = [];

        // 1. Initialize
        async function init() {
            currentUser = UserContext.getUser();
            if (!currentUser) {
                window.location.href = 'index.html';
                return;
            }

            loadingSpinner.style.display = 'block';

            try {
                // Find existing Open conversation
                const { data: existingConv, error: fetchError } = await supabase
                    .from('conversations')
                    .select('id')
                    .eq('user_id', currentUser.id)
                    .eq('status', 'open')
                    .maybeSingle();

                if (fetchError) throw fetchError;

                if (existingConv) {
                    conversationId = existingConv.id;
                } else {
                    // Create New Conversation
                    const { data: newConv, error: createError } = await supabase
                        .from('conversations')
                        .insert([{ user_id: currentUser.id }])
                        .select()
                        .single();
                    
                    if (createError) throw createError;
                    conversationId = newConv.id;
                }

                // Load History & Subscribe
                await fetchMessages();
                subscribeToMessages();

            } catch (err) {
                console.error('Chat Init Error:', err);
                renderEmptyState('Error connecting to support.');
            } finally {
                loadingSpinner.style.display = 'none';
            }
        }

        // 2. Fetch History
        async function fetchMessages() {
            const { data, error } = await supabase
                .from('messages')
                .select('*')
                .eq('conversation_id', conversationId)
                .order('created_at', { ascending: true });

            if (data) {
                messages = data;
                renderMessages();
                scrollToBottom();
            }
        }

        // 3. Real-time Subscription
        function subscribeToMessages() {
            supabase
                .channel(`conversation_sub:${conversationId}`)
                .on(
                    'postgres_changes',
                    {
                        event: 'INSERT',
                        schema: 'public',
                        table: 'messages',
                        filter: `conversation_id=eq.${conversationId}`,
                    },
                    (payload) => {
                        // Avoid duplicates
                        if (!messages.find(m => m.id === payload.new.id)) {
                            messages.push(payload.new);
                            renderMessages();
                            scrollToBottom();
                        }
                    }
                )
                .subscribe();
        }

        // 4. Send Message
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !conversationId) return;

            messageInput.value = ''; // Clear input immediately
            toggleButton();

            try {
                const { error } = await supabase
                    .from('messages')
                    .insert([{
                        conversation_id: conversationId,
                        sender_id: currentUser.id,
                        sender_type: 'user',
                        message_text: text
                    }]);

                if (error) throw error;
                // Note: The subscription will handle adding the message to UI

            } catch (err) {
                alert('Failed to send message.');
                messageInput.value = text; // Restore text on fail
            }
        }

        // 5. Render Logic
        function renderMessages() {
            if (messages.length === 0) {
                renderEmptyState('How can we help you today?');
                return;
            }

            chatContainer.innerHTML = messages.map(msg => {
                const isUser = msg.sender_type === 'user';
                return `
                    <div class="message-bubble ${isUser ? 'user-bubble' : 'admin-bubble'}">
                        ${escapeHtml(msg.message_text)}
                    </div>
                `;
            }).join('');
        }

        function renderEmptyState(text) {
            chatContainer.innerHTML = `<div class="empty-state">${text}</div>`;
        }

        function scrollToBottom() {
            // Small timeout to ensure DOM is rendered
            setTimeout(() => {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }, 50);
        }

        // Utils
        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function toggleButton() {
            sendBtn.disabled = !messageInput.value.trim();
        }

        // Event Listeners
        sendBtn.addEventListener('click', sendMessage);
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        messageInput.addEventListener('input', toggleButton);

        // Run
        init();

    </script>
</body>
</html>
