<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Edit Profile | Quantum Core</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* --- FOUNDRY CORE DESIGN SYSTEM --- */
      :root {
        --bg-top: #000000;
        --bg-mid: #0a0500;
        --bg-bottom: #140a00;
        
        --gold-metallic: #d4af37;
        --gold-bright: #ffd700;
        --gold-dark: #b8860b;
        
        --status-green: #00ff88;
        --status-red: #ff4500;
        --status-blue: #00f2ff;
        
        --card-bg: #080808;
        --glass-border: rgba(255, 215, 0, 0.15);
        --text-grey: #8b8b8b;
        
        --radius-app: 25px;
      }

      /* --- GLOBAL RESET --- */
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        outline: none;
      }

      body {
        background: linear-gradient(
          180deg,
          var(--bg-top) 0%,
          var(--bg-mid) 50%,
          var(--bg-bottom) 100%
        );
        background-attachment: fixed;
        color: #fff;
        font-family: "Inter", sans-serif;
        margin: 0;
        padding: 0;
        min-height: 100vh;
      }

      .page-wrapper {
        width: 100%;
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
        padding-bottom: 80px;
      }

      /* --- NAV --- */
      .nav-bar {
        display: flex;
        align-items: center;
        margin-bottom: 30px;
        margin-top: 10px;
      }
      .back-btn {
        background: rgba(255, 215, 0, 0.05);
        border: 1px solid rgba(255, 215, 0, 0.2);
        color: var(--gold-bright);
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        padding: 10px 20px;
        border-radius: 30px;
        text-decoration: none;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 8px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .back-btn:hover {
        background: rgba(255, 215, 0, 0.15);
        border-color: var(--gold-bright);
        box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        transform: translateX(-3px);
      }

      /* --- AVATAR HEADER --- */
      .profile-header {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 40px;
        position: relative;
      }

      .avatar-wrapper {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: radial-gradient(circle, #1a1005 0%, #000 100%);
        border: 2px solid var(--gold-dark);
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 20px;
        overflow: visible;
        box-shadow: 0 0 30px rgba(184, 134, 11, 0.3);
        transition: 0.3s;
      }
      .avatar-wrapper:hover {
        border-color: var(--gold-bright);
        box-shadow: 0 0 40px rgba(255, 215, 0, 0.5);
      }

      .avatar-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 50%;
      }
      .avatar-placeholder {
        font-size: 42px;
        font-weight: 800;
        color: var(--gold-bright);
        text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
      }

      .edit-badge {
        position: absolute;
        bottom: 5px;
        right: 5px;
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, var(--gold-metallic), var(--gold-bright));
        border-radius: 50%;
        border: 3px solid #000;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: #000;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        transition: 0.2s;
      }
      .edit-badge:hover {
        transform: scale(1.1);
      }

      .account-badge {
        background: rgba(255, 215, 0, 0.1);
        padding: 8px 20px;
        border-radius: 20px;
        font-family: "JetBrains Mono";
        font-size: 12px;
        color: var(--gold-bright);
        border: 1px solid var(--gold-dark);
        font-weight: 700;
        letter-spacing: 1px;
        text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
      }

      /* --- STATS ROW --- */
      .stats-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin-bottom: 30px;
      }
      .stat-card {
        background: linear-gradient(180deg, #0e0e0e, #050505);
        border: 1px solid var(--glass-border);
        padding: 18px;
        border-radius: 20px;
        text-align: center;
        transition: 0.3s;
      }
      .stat-card:hover {
        border-color: var(--gold-bright);
        box-shadow: 0 0 15px rgba(255, 215, 0, 0.1);
        transform: translateY(-2px);
      }

      .stat-label {
        font-size: 9px;
        color: var(--text-grey);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        font-weight: 800;
        display: block;
        margin-bottom: 6px;
      }
      .stat-val {
        font-size: 15px;
        font-weight: 700;
        color: #fff;
      }
      .stat-highlight {
        color: var(--gold-bright);
        font-family: "JetBrains Mono";
        text-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
      }

      /* --- FORM --- */
      .form-card {
        background: #050505;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: var(--radius-app);
        padding: 30px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      }

      .input-group {
        margin-bottom: 25px;
      }
      .label {
        font-size: 10px;
        color: var(--gold-metallic);
        margin-bottom: 10px;
        display: block;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        opacity: 0.8;
      }

      .input-field {
        width: 100%;
        height: 55px;
        background: #0a0a0a;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 0 20px;
        color: #fff;
        font-size: 15px;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.5);
      }
      .input-field:focus {
        border-color: var(--gold-bright);
        background: #000;
        box-shadow: 0 0 15px rgba(255, 215, 0, 0.15);
      }
      .input-field:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .row-inputs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
      }

      .save-btn {
        width: 100%;
        height: 60px;
        border: none;
        border-radius: 18px;
        background: linear-gradient(
          90deg,
          var(--gold-metallic),
          var(--gold-bright)
        );
        color: #000;
        font-size: 14px;
        font-weight: 900;
        letter-spacing: 2px;
        cursor: pointer;
        margin-top: 15px;
        text-transform: uppercase;
        box-shadow: 0 10px 30px rgba(184, 134, 11, 0.3);
        transition: all 0.3s ease;
      }
      .save-btn:hover {
        box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        transform: translateY(-2px);
      }
      .save-btn:active {
        transform: scale(0.98);
      }

      .spinner {
        width: 24px;
        height: 24px;
        border: 3px solid rgba(0, 0, 0, 0.1);
        border-top: 3px solid #000;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: auto;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 600px) {
        .row-inputs {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-wrapper">
      <div class="nav-bar">
        <button class="back-btn" onclick="window.history.back()">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="3"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M15 18l-6-6 6-6" />
          </svg>
          BACK
        </button>
      </div>

      <div class="profile-header">
        <div class="avatar-wrapper">
          <img id="avatarImg" class="avatar-img" style="display: none" />
          <span id="avatarPlaceholder" class="avatar-placeholder">U</span>
          <div class="edit-badge">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="3"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
          </div>
        </div>
        <div id="accountDisplay" class="account-badge">ID: ACCESSING...</div>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <span class="stat-label">Sponsor Identity</span>
          <div id="referrerName" class="stat-val">...</div>
        </div>
        <div class="stat-card">
          <span class="stat-label">Sponsor ID</span>
          <div id="referrerAcc" class="stat-val stat-highlight">...</div>
        </div>
      </div>

      <div class="form-card">
        <div class="row-inputs">
          <div class="input-group">
            <label class="label">Username</label>
            <input
              type="text"
              id="username"
              class="input-field"
              placeholder="IDENTITY"
            />
          </div>
          <div class="input-group">
            <label class="label">Mobile</label>
            <input
              type="tel"
              id="mobile"
              class="input-field"
              placeholder="+1 ..."
            />
          </div>
        </div>

        <div class="input-group">
          <label class="label">Wallet Address (TRC20)</label>
          <input
            type="text"
            id="senderWallet"
            class="input-field"
            placeholder="TARGET LEDGER ADDRESS"
          />
        </div>

        <div class="input-group">
          <label class="label">New Password (Optional)</label>
          <input
            type="password"
            id="newPassword"
            class="input-field"
            placeholder="SECURE OVERRIDE"
          />
        </div>

        <div class="input-group">
          <label class="label" style="color: var(--gold-bright)"
            >Current Password (Required)</label
          >
          <input
            type="password"
            id="currentPassword"
            class="input-field"
            style="border-color: rgba(212, 175, 55, 0.4)"
            placeholder="VERIFY IDENTITY"
          />
        </div>

        <button id="saveBtn" class="save-btn">SAVE CHANGES</button>
      </div>
    </div>

    <script type="module">
      import { supabase } from "./supabaseClient.js";
      import { UserContext } from "./userContext.js";

      const els = {
        avatarImg: document.getElementById("avatarImg"),
        avatarPlaceholder: document.getElementById("avatarPlaceholder"),
        accountDisplay: document.getElementById("accountDisplay"),
        referrerName: document.getElementById("referrerName"),
        referrerAcc: document.getElementById("referrerAcc"),
        username: document.getElementById("username"),
        mobile: document.getElementById("mobile"),
        senderWallet: document.getElementById("senderWallet"),
        newPassword: document.getElementById("newPassword"),
        currentPassword: document.getElementById("currentPassword"),
        saveBtn: document.getElementById("saveBtn"),
      };

      let currentUser = null;
      let storedPassword = "";
      let isSaving = false;

      async function init() {
        currentUser = UserContext.getUser();
        if (!currentUser) {
          window.location.href = "index.html";
          return;
        }
        await fetchFullProfile();
      }

      async function fetchFullProfile() {
        try {
          const { data, error } = await supabase
            .from("users")
            .select(
              "username, mobile, password, profileImage, referrer_account_number, account_number, sender_wallet_address"
            )
            .eq("id", currentUser.id)
            .single();

          if (error || !data) throw error;

          storedPassword = data.password || "";
          els.username.value = data.username || "";
          els.mobile.value = data.mobile || "";
          els.senderWallet.value = data.sender_wallet_address || "";

          renderHeader(data);

          if (data.referrer_account_number) {
            els.referrerAcc.innerText = data.referrer_account_number;
            const { data: refData } = await supabase
              .from("users")
              .select("username")
              .eq("account_number", data.referrer_account_number)
              .maybeSingle();
            els.referrerName.innerText = refData
              ? refData.username
              : "Unknown";
          } else {
            els.referrerName.innerText = "System";
            els.referrerAcc.innerText = "---";
          }
        } catch (err) {
          console.error(err);
        }
      }

      function renderHeader(data) {
        els.accountDisplay.innerText = `ID: ${data.account_number || "..."}`;
        if (data.profileImage) {
          els.avatarImg.src = data.profileImage;
          els.avatarImg.style.display = "block";
          els.avatarPlaceholder.style.display = "none";
        } else {
          els.avatarImg.style.display = "none";
          els.avatarPlaceholder.style.display = "block";
          els.avatarPlaceholder.innerText = (data.username || "U")
            .charAt(0)
            .toUpperCase();
        }
      }

      async function handleSave() {
        if (isSaving) return;
        const username = els.username.value.trim();
        const currPass = els.currentPassword.value.trim();

        if (!username || !currPass) {
          alert("IDENTITY VERIFICATION REQUIRED");
          return;
        }
        if (currPass !== storedPassword) {
          alert("INCORRECT PASSWORD");
          return;
        }

        isSaving = true;
        els.saveBtn.innerHTML = '<div class="spinner"></div>';
        els.saveBtn.disabled = true;

        try {
          const finalPassword =
            els.newPassword.value.trim() || storedPassword;
          const { error } = await supabase
            .from("users")
            .update({
              username,
              mobile: els.mobile.value.trim(),
              sender_wallet_address: els.senderWallet.value.trim(),
              password: finalPassword,
            })
            .eq("id", currentUser.id);

          if (error) throw error;
          storedPassword = finalPassword;
          UserContext.setUser({ ...currentUser, username });
          els.newPassword.value = "";
          els.currentPassword.value = "";
          alert("PROFILE UPDATED IN LEDGER");
        } catch (err) {
          alert(err.message.toUpperCase());
        } finally {
          isSaving = false;
          els.saveBtn.innerHTML = "SAVE CHANGES";
          els.saveBtn.disabled = false;
        }
      }

      els.saveBtn.addEventListener("click", handleSave);
      init();
    </script>
  </body>
</html>
