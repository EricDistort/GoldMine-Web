<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login</title>
    <style>
        /* --- GLOBAL RESET & THEME --- */
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #050505;
            color: #fff;
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- BACKGROUND GLOWS --- */
        .glow-top {
            position: absolute;
            top: -15vh;
            left: -20vw;
            width: 120vw;
            height: 120vw;
            background: radial-gradient(circle, rgba(123, 0, 148, 0.4) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none; /* Crucial: lets clicks pass through */
            z-index: 0;
        }

        .glow-bottom {
            position: absolute;
            bottom: -100px;
            right: -50px;
            width: 200px;
            height: 200px;
            background-color: #ff00d4;
            opacity: 0.08;
            border-radius: 50%;
            filter: blur(40px);
            pointer-events: none; /* Crucial: lets clicks pass through */
            z-index: 0;
        }

        /* --- LAYOUT --- */
        .container {
            position: relative;
            z-index: 10; /* Lifts content above background */
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 24px;
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }

        /* --- TYPOGRAPHY --- */
        .header {
            margin-bottom: 40px;
        }

        .title-outline {
            font-size: 42px;
            font-weight: 300;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
            margin: 0;
            line-height: 1;
        }

        .title-filled {
            font-size: 42px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 2px;
            margin: 0;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
            font-weight: 400;
        }

        /* --- FORMS --- */
        .input-group {
            margin-bottom: 20px;
            position: relative;
            z-index: 20;
        }

        .label {
            font-size: 10px;
            font-weight: 700;
            color: #ff00d4;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: block;
        }

        .input-field {
            position: relative;
            z-index: 30; /* Ensure input is on top */
            width: 100%;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 22px;
            padding: 14px 16px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
            pointer-events: auto; /* Force clickable */
        }

        .input-field:focus {
            border-color: #ff00d4;
            background-color: rgba(255, 255, 255, 0.08);
        }

        .spacer {
            height: 10px;
        }

        /* --- BUTTONS --- */
        .pop-btn {
            position: relative;
            z-index: 20;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            user-select: none;
            border: none;
            background: none;
            padding: 0;
            width: 100%;
        }

        .pop-btn:active {
            transform: scale(0.95);
            transition: transform 0.1s ease-out;
        }

        .gradient-btn {
            width: 100%;
            padding: 18px;
            border-radius: 25px;
            background: linear-gradient(90deg, #7b0094, #ff00d4);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 15px rgba(255, 0, 212, 0.4);
        }

        .btn-text {
            color: #fff;
            font-size: 16px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- LINKS --- */
        .register-link {
            text-align: center;
            margin-top: 20px;
            display: block;
            text-decoration: none;
        }

        .register-text {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        .register-highlight {
            color: #fff;
            font-weight: 700;
        }

        /* --- LOADING OVERLAY --- */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 999;
            display: none; /* Hidden by default */
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 0, 212, 0.3);
            border-radius: 50%;
            border-top-color: #ff00d4;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="glow-top"></div>
    <div class="glow-bottom"></div>

    <div id="loading-overlay">
        <div class="spinner"></div>
    </div>

    <div class="container">
        
        <div class="header">
            <h1 class="title-outline">Welcome</h1>
            <h1 class="title-filled">Back</h1>
            <p class="subtitle">Sign in to access your portfolio.</p>
        </div>

        <div class="input-group">
            <label class="label">ACCOUNT NUMBER</label>
            <input type="tel" id="accountNumber" class="input-field" placeholder="e.g. 12345678">
        </div>

        <div class="input-group">
            <label class="label">PASSWORD</label>
            <input type="password" id="password" class="input-field" placeholder="••••••••••••">
        </div>

        <div class="spacer"></div>

        <button id="loginBtn" class="pop-btn">
            <div class="gradient-btn">
                <span class="btn-text">ACCESS ACCOUNT</span>
            </div>
        </button>

        <a href="register.html" class="pop-btn register-link">
            <span class="register-text">New here? <span class="register-highlight">Create Account</span></span>
        </a>

    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';
        import { UserContext } from './userContext.js';

        const loginBtn = document.getElementById('loginBtn');
        const loadingOverlay = document.getElementById('loading-overlay');
        const accountInput = document.getElementById('accountNumber');
        const passwordInput = document.getElementById('password');

        loginBtn.addEventListener('click', async (e) => {
            e.preventDefault(); // Prevent any default form submission
            
            const accNum = accountInput.value.trim();
            const pass = passwordInput.value.trim();

            if (!accNum || !pass) {
                alert('Please fill in all fields.');
                return;
            }

            // Show Loading
            loadingOverlay.style.display = 'flex';
            const startTime = Date.now();

            try {
                // Fetch User
                const { data: user, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('account_number', parseInt(accNum))
                    .maybeSingle();

                if (error) throw error;

                // Artificial Delay (to match React Native feel)
                const elapsedTime = Date.now() - startTime;
                const minDuration = 1500; 
                const remainingTime = Math.max(0, minDuration - elapsedTime);
                await new Promise(r => setTimeout(r, remainingTime));

                if (!user) {
                    throw new Error('Account number not found.');
                }

                if (user.password === pass) {
                    // Success - Save User & Navigate
                    UserContext.setUser(user);
                    window.location.href = 'main.html'; 
                } else {
                    throw new Error('Invalid password.');
                }

            } catch (err) {
                // Artificial delay for error state too
                await new Promise(r => setTimeout(r, 1000));
                alert(err.message);
            } finally {
                loadingOverlay.style.display = 'none';
            }
        });
    </script>
</body>
</html>
