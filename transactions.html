<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Activity Feed | Quantum Core</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* --- FOUNDRY CORE DESIGN SYSTEM --- */
      :root {
        --bg-top: #000000;
        --bg-mid: #0a0500;
        --bg-bottom: #140a00;
        
        --gold-metallic: #d4af37;
        --gold-bright: #ffd700;
        --gold-dark: #b8860b;
        
        --status-green: #00ff88;
        --status-red: #ff4500;
        --status-blue: #00f2ff;
        
        --card-bg: #080808;
        --glass-border: rgba(255, 215, 0, 0.15);
        --text-grey: #8b8b8b;
        
        --radius-app: 20px;
      }

      /* --- GLOBAL RESET --- */
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        outline: none;
      }

      body {
        background: linear-gradient(
          180deg,
          var(--bg-top) 0%,
          var(--bg-mid) 50%,
          var(--bg-bottom) 100%
        );
        background-attachment: fixed;
        color: #fff;
        font-family: "Inter", sans-serif;
        margin: 0;
        padding: 0;
        min-height: 100vh;
      }

      .page-wrapper {
        width: 100%;
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
        padding-bottom: 80px;
      }

      /* --- NAV --- */
      .nav-bar {
        display: flex;
        align-items: center;
        margin-bottom: 30px;
        margin-top: 10px;
      }
      .back-btn {
        background: rgba(255, 215, 0, 0.05);
        border: 1px solid rgba(255, 215, 0, 0.2);
        color: var(--gold-bright);
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        padding: 10px 20px;
        border-radius: 30px;
        text-decoration: none;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        display: flex;
        align-items: center;
        gap: 8px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .back-btn:hover {
        background: rgba(255, 215, 0, 0.15);
        border-color: var(--gold-bright);
        box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        transform: translateX(-3px);
      }

      /* --- HEADER --- */
      .header {
        margin-bottom: 30px;
        text-align: left;
        padding-left: 5px;
      }
      .header-title {
        font-size: 32px;
        font-weight: 800;
        margin: 0;
        letter-spacing: 2px;
        color: var(--gold-metallic);
        text-transform: uppercase;
        text-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
      }
      .header-subtitle {
        color: var(--text-grey);
        font-size: 10px;
        margin-top: 5px;
        letter-spacing: 2px;
        font-weight: 700;
        text-transform: uppercase;
        opacity: 0.7;
      }

      .header-line {
        height: 3px;
        width: 60px;
        border-radius: 2px;
        background: linear-gradient(90deg, var(--gold-bright), transparent);
        margin-top: 15px;
        box-shadow: 0 0 10px var(--gold-dark);
      }

      /* --- CARD STYLES --- */
      .activity-list {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .card {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-app);
        padding: 18px;
        display: grid;
        grid-template-columns: 48px 1fr auto; /* Fixed icon width */
        align-items: center;
        gap: 15px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        position: relative;
        overflow: hidden;
      }

      /* Hover Physics */
      .card:hover {
        background: linear-gradient(90deg, #0e0e0e, #050505);
        border-color: var(--gold-bright);
        transform: translateY(-3px) scale(1.01);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), 0 0 1px var(--gold-bright);
      }
      .card:active {
        transform: scale(0.98);
      }

      /* Left Icon Area */
      .icon-box {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        font-weight: bold;
        background: #000;
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--gold-bright);
        overflow: hidden;
        transition: 0.3s;
        box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
      }
      
      .card:hover .icon-box {
        border-color: var(--gold-bright);
        box-shadow: 0 0 15px rgba(255, 215, 0, 0.15);
      }

      .media-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.8;
        transition: 0.3s;
      }
      .card:hover .media-img { opacity: 1; transform: scale(1.1); }

      /* Middle Text */
      .text-col {
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .primary-text {
        font-size: 14px;
        font-weight: 700;
        color: #fff;
        margin-bottom: 4px;
        letter-spacing: 0.5px;
      }
      .secondary-text {
        font-size: 10px;
        font-weight: 600;
        color: #666;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .card:hover .secondary-text { color: #999; }

      /* Right Meta */
      .meta-col {
        text-align: right;
      }
      .amount-text {
        font-family: "JetBrains Mono";
        font-size: 15px;
        font-weight: 700;
        letter-spacing: -0.5px;
      }
      .time-text {
        font-size: 9px;
        color: #555;
        margin-top: 4px;
        font-weight: 600;
      }
      .card:hover .time-text { color: var(--gold-dark); }

      /* --- VARIANTS --- */
      /* Transactions */
      .card-tx-sent .amount-text { color: var(--status-red); text-shadow: 0 0 10px rgba(255, 69, 0, 0.3); }
      .card-tx-recv .amount-text { color: var(--status-green); text-shadow: 0 0 10px rgba(0, 255, 136, 0.3); }
      .card-tx-sent .icon-box, .card-tx-recv .icon-box { border-radius: 50%; } /* Round icons for transactions */

      /* Feed/News */
      .card-feed { border-left: 2px solid var(--status-blue); }
      .card-feed:hover { border-left-color: #fff; }

      /* Product */
      .card-prod { border-left: 2px solid var(--gold-bright); }
      
      /* --- SKELETON LOADER --- */
      .skeleton {
        background: #080808;
        height: 80px;
        border-radius: var(--radius-app);
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.05);
      }
      .skeleton::after {
        content: "";
        position: absolute;
        top: 0; right: 0; bottom: 0; left: 0;
        transform: translateX(-100%);
        background-image: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0) 0,
          rgba(255, 255, 255, 0.05) 20%,
          rgba(255, 255, 255, 0.1) 60%,
          rgba(255, 255, 255, 0)
        );
        animation: shimmer 2s infinite;
      }

      @keyframes shimmer {
        100% { transform: translateX(100%); }
      }

      @media (max-width: 600px) {
        .header-title { font-size: 28px; }
      }
    </style>
  </head>
  <body>
    <div class="page-wrapper">
      <div class="nav-bar">
        <a href="main.html" class="back-btn pop-click">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="3"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M15 18l-6-6 6-6" />
          </svg>
          Back to Core
        </a>
      </div>

      <div class="header">
        <h1 class="header-title">Data Logs</h1>
        <p class="header-subtitle">Ledger • Intel • Logistics</p>
        <div class="header-line"></div>
      </div>

      <div id="activityList" class="activity-list">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    </div>

    <script type="module">
      import { supabase } from "./supabaseClient.js";
      import { UserContext } from "./userContext.js";

      const listEl = document.getElementById("activityList");
      let currentUser = null;

      async function init() {
        currentUser = UserContext.getUser();
        if (!currentUser) {
          window.location.href = "index.html";
          return;
        }
        await fetchData();
      }

      async function fetchData() {
        try {
          const { data: txData } = await supabase
            .from("transactions")
            .select(
              `id, sender_acc, receiver_acc, amount, created_at, sender:sender_acc(username), receiver:receiver_acc(username)`
            )
            .or(
              `sender_acc.eq.${currentUser.account_number},receiver_acc.eq.${currentUser.account_number}`
            )
            .order("created_at", { ascending: false });

          const { data: feedData } = await supabase
            .from("feeds")
            .select("id, title, banner_url, created_at")
            .order("created_at", { ascending: false });

          const { data: prodData } = await supabase
            .from("products")
            .select("id, name, image_url, price, created_at")
            .order("created_at", { ascending: false });

          const transactions = (txData || []).map((t) => ({
            ...t,
            type: "transaction",
          }));
          const feeds = (feedData || []).map((f) => ({ ...f, type: "feed" }));
          const products = (prodData || []).map((p) => ({
            ...p,
            type: "product",
          }));

          const combined = [...transactions, ...feeds, ...products].sort(
            (a, b) => new Date(b.created_at) - new Date(a.created_at)
          );

          renderList(combined);
        } catch (err) {
          console.error(err);
          listEl.innerHTML =
            '<div style="text-align:center; color:#D4AF37; margin-top:40px; font-family: JetBrains Mono;">[ ERR: LEDGER EMPTY ]</div>';
        }
      }

      function renderList(items) {
        if (items.length === 0) {
          listEl.innerHTML = `<div style="text-align:center; color:#555; margin-top:80px;">
                    <div style="font-size:40px; margin-bottom:15px; opacity:0.5;">📂</div>
                    <div style="letter-spacing:2px; font-weight:700; font-size:12px; font-family: JetBrains Mono;">NO DATA FOUND</div>
                </div>`;
          return;
        }

        listEl.innerHTML = items
          .map((item) => {
            const date = new Date(item.created_at);
            const dateStr = date.toLocaleDateString();
            const timeStr = date.toLocaleTimeString([], {
              hour: "2-digit",
              minute: "2-digit",
            });

            if (item.type === "transaction") {
              const isSent = item.sender_acc == currentUser.account_number;
              const otherUser = isSent ? item.receiver : item.sender;
              const otherName = otherUser?.username || "Unknown Operator";
              const cardClass = isSent ? "card-tx-sent" : "card-tx-recv";

              return `
                        <div class="card ${cardClass} pop-click" onclick="alert('TXID: ${
                item.id
              }')">
                            <div class="icon-box">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                    ${
                                      isSent
                                        ? '<path d="M7 17l9.2-9.2M17 17V7H7"/>'
                                        : '<path d="M17 7l-9.2 9.2M7 7v10h10"/>'
                                    }
                                </svg>
                            </div>
                            <div class="text-col">
                                <div class="primary-text">${otherName}</div>
                                <div class="secondary-text">${dateStr} • FUNDS TRANSFER</div>
                            </div>
                            <div class="meta-col">
                                <div class="amount-text">${
                                  isSent ? "-" : "+"
                                }$${Math.abs(item.amount)}</div>
                                <div class="time-text">${timeStr}</div>
                            </div>
                        </div>`;
            }

            if (item.type === "feed") {
              const iconContent = item.banner_url
                ? `<img src="${item.banner_url}" class="media-img">`
                : "📰";
              return `
                        <div class="card card-feed pop-click" onclick="window.location.href='receive.html'">
                            <div class="icon-box" style="border-radius:12px; background:#111;">${iconContent}</div>
                            <div class="text-col">
                                <div class="primary-text">${item.title}</div>
                                <div class="secondary-text" style="color:var(--status-blue)">${dateStr} • INTEL FEED</div>
                            </div>
                            <div class="meta-col">
                                <div style="color:var(--gold-metallic); font-size:20px; font-weight:800;">›</div>
                            </div>
                        </div>`;
            }

            if (item.type === "product") {
              const iconContent = item.image_url
                ? `<img src="${item.image_url}" class="media-img">`
                : "🛍️";
              return `
                        <div class="card card-prod pop-click" onclick="window.location.href='store.html'">
                            <div class="icon-box" style="border-radius:12px;">${iconContent}</div>
                            <div class="text-col">
                                <div class="primary-text">${item.name}</div>
                                <div class="secondary-text" style="color:var(--gold-bright)">${dateStr} • SUPPLY DROP</div>
                            </div>
                            <div class="meta-col">
                                <div class="amount-text" style="color:var(--gold-bright)">$${item.price}</div>
                            </div>
                        </div>`;
            }
          })
          .join("");
      }

      init();
    </script>
  </body>
</html>
